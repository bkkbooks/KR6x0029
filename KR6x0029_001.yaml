body:
  text: 發趣論歸命彼世尊應供正覺者論母設置分緣略說一因緣所緣緣增上緣無間緣等無間緣俱生緣互相緣依止緣親依止緣前生緣後生緣修習緣業緣異熟緣食緣根緣靜慮緣道緣相應緣不相應緣有緣無有緣去緣不去緣緣分別分緣廣說二因緣者諸因是依因相應之諸法及其等起諸色之因緣為緣三所緣緣者色處是依眼識界及其相應諸法之所緣緣為緣聲處是依耳識界及其相應諸法之所緣緣為緣香處是依鼻識界及其相應諸法之所緣緣為緣味處是依舌識界及其相應諸法之所緣緣為緣所觸處是依身識界及其相應諸法之所緣緣為緣色處聲處香處味處所觸處是依意界及其相應諸法之所緣緣為緣一切諸法是依意識界及其相應諸法之所緣緣為緣凡緣如如之法而如如之諸法即諸心心所法生者則如是如是之諸法是依如是如是之諸心心所法之所緣緣為緣四增上緣者欲增上是依欲相應之諸法及其等起諸色之增上緣為緣勤增上是依勤相應之諸法及其等起諸色之增上緣為緣心增上是依心相應之諸法及其等起諸色之增上緣為緣觀增上是依觀相應之諸法及其等起諸色之增上緣為緣凡以如如之法為主而如如之諸法即是諸心心所法生者如是如是之諸法是依如是如是諸心心所法之增上緣為緣五無間緣者是眼識界及其相應之諸法依意界及其相應諸法之無間緣為緣意界及其相應之諸法依意識界及其相應諸法之無間緣為緣耳識界及其相應之諸法依意界及其相應諸法之無間緣為緣意界及其相應之諸法依意識界及其相應諸法之無間緣為緣鼻識界及其相應之諸法依意界及其相應諸法之無間緣為緣意界及其相應之諸法依意識界及其相應諸法之無間緣為緣舌識界及其相應之諸法依意界及其相應諸法之無間緣為緣意界及其相應之諸法依意識界及其相應諸法之無間緣為緣身識界及其相應之諸法依意界及其相應諸法之無間緣為緣意界及其相應之諸法依意識界及其相應諸法之無間緣為緣前者之諸善法依後者諸善法之無間緣為緣前者之諸善法依後者諸無記法之無間緣為緣前者之諸不善法依後者諸不善法之無間緣為緣前者之諸不善法依後者諸無記法之無間緣為緣前者之諸無記法依後者諸無記法之無間緣為緣前者之諸無記法依後者諸善法之無間緣為緣前者之諸無記法依後者諸不善法之無間緣為緣凡於如如諸法之無間若如如諸法即諸心心所法生者如是如是之諸法依如是如是諸法之無間緣為緣六等無間緣者是眼識界及其相應之諸法依意界及其相應諸法之等無間緣為緣意界及其相應之諸法依意識界及其相應諸法之等無間緣為緣耳識界及其相應之諸法依意界及其相應諸法之等無間緣為緣意界及其相應之諸法依意識界及其相應諸法之等無間緣為緣鼻識界及其相應之諸法依意界及其相應諸法之等無間緣為緣意界及其相應之諸法依意識界及其相應諸法之等無間緣為緣舌識界及其相應之諸法依意界及其相應諸法之等無間緣為緣意界及其相應之諸法依意識界及其相應諸法之等無間緣為緣身識界及其相應之諸法依意界及其相應諸法之等無間緣為緣意界及其相應之諸法依意識界及其相應諸法之等無間緣為緣前者之諸善法依後者諸善法之等無間緣為緣前者之諸善法依後者諸無記法之等無間緣為緣前者之諸不善法依後者諸不善法之等無間緣為緣前者之諸不善法依後者諸無記法之等無間緣為緣前者之諸無記法依後者諸無記法之等無間緣為緣前者之諸無記法依後者諸善法之等無間緣為緣前者之諸無記法依後者諸不善法之等無間緣為緣凡如如諸法之等無間若如如諸法即諸心心所法生者如是如是之諸法依如是如是諸法之等無間緣為緣七俱生緣者是四非有色法是互相之俱生緣為緣四大種是互相之俱生緣為緣於入胎剎那之名與色是互相之俱生緣為緣諸心心所法依心等起諸色之俱生緣為緣四大種依諸所造色之俱生緣為緣諸有色法某時依諸非有色法之俱生緣為緣某時不依俱生緣為緣八互相緣者是四非有色蘊依互相緣為緣四大種是依互相緣為緣於入胎剎那之名與色是依互相緣為緣九依止緣者是四非有色蘊互相依是依止緣為緣四大種是互相依依止緣為緣於入胎剎那之名與色是互相依依止緣為緣四大種是依諸所造色之依止緣為緣眼處是依眼識界及其相應諸法之依止緣為緣耳處是依耳識界及其相應諸法之依止緣為緣鼻處是依鼻識界及其相應諸法之依止緣為緣舌處是依舌識界及其相應諸法之依止緣為緣身處是依身識界及其相應諸法之依止緣為緣凡依止於某色而意界及意識界轉者其色是依意界與意識界及其相應諸法之依止緣為緣一親依止緣者是前前之諸善法依後後諸善法之親依止緣為緣前前之諸善法依後後若干不善法之親依止緣為緣前前之諸善法依後後諸無記法之親依止緣為緣前前之諸不善法依後後諸不善法之親依止緣為緣前前之諸不善法依後後若干善法之親依止緣為緣前前之諸不善法依後後諸無記法之親依止緣為緣前前之諸無記法依後後諸無記法之親依止緣為緣前前之諸無記法依後後諸不善法之親依止緣為緣補特伽羅亦依親依止緣為緣牀座亦依親依止緣為緣一一前生緣者是眼處依眼識界及其相應諸法之前生緣為緣耳處依耳識界及其相應諸法之前生緣為緣鼻處依鼻識界及其相應諸法之前生緣為緣舌處依舌識界及其相應諸法之前生緣為緣身處依身識界及其相應諸法之前生緣為緣色處依眼識界及其相應諸法之前生緣為緣聲處依耳識界及其相應諸法之前生緣為緣香處依鼻識界及其相應諸法之前生緣為緣味處依舌識界及其相應諸法之前生緣為緣所觸處依身識界及其相應諸法之前生緣為緣色處聲處香處味處所觸處依意界及其相應諸法之前生緣為緣凡依止於某色而意界及意識界轉者其色依意界及其相應諸法之前生緣為緣而於意識界及其相應之諸法有時依前生緣為緣有時不依前生緣為緣一二後生緣者是後生之諸心心所法依前生之此身為後生緣為緣一三修習緣者是前前之諸善法依後後諸法之修習緣為緣前前之諸不善法依後後諸不善法之修習緣為緣前前之諸唯作無記法依後後諸唯作無記法之修習緣為緣一四業緣者是善不善業依異熟之諸蘊及業果諸色之業緣為緣思依諸相應法及其等起諸色之業緣為緣一五異熟緣者是異熟之四非有色蘊於互相依異熟緣為緣一六食緣者是段食依此身之食緣為緣諸非有色食是依諸相應法及其等起諸色之食緣為緣一七根緣者是眼根依眼識界及其相應諸法之根緣為緣耳根依耳識界及其相應諸法之根緣為緣鼻根依鼻識界及其相應諸法之根緣為緣舌根依舌識界及其相應諸法之根緣為緣身根依身識界及其相應諸法之根緣為緣色命根依諸業果色根緣為緣諸非有色根依相應之諸法及其等起諸色之根緣為緣一八靜慮緣者是諸靜慮支依靜慮相應之諸法及其等起諸色之靜慮緣為緣一九道緣者是諸道支依道相應之諸法及其等起諸色之道緣為緣二相應緣者是四非有色蘊互相依相應緣為緣二一不相應緣者是諸有色法依諸非有色法之不相應緣為緣諸非有色法依諸有色法不相應緣為緣二二有緣者是四非有色蘊互相依有緣為緣四大種是互相依有緣為緣於入胎剎那之名與色是互相依有緣為緣諸心與心所法是依心等起諸色之有緣為緣四大種是依諸所造色有緣為緣眼處是依眼識界及其相應諸法之有緣為緣耳處是依耳識界及其相應諸法之有緣為緣鼻處是依鼻識界及其相應諸法之有緣為緣舌處是依舌識界及其相應諸法之有緣為緣身處是依身識界及其相應諸法之有緣為緣色處是依眼識界及其相應諸法之有緣為緣聲處是依耳識界及其相應諸法之有緣為緣香處是依鼻識界及其相應諸法之有緣為緣味處是依舌識界及其相應諸法之有緣為緣所觸處是依身識界及其相應諸法之有緣為緣色處聲處香處味處所觸處是依意界及其相應諸法之有緣為緣凡依止於某色而意界及意識界轉者其色是依意界與意識界及其相應諸法之有緣為緣二三無有緣者是等無間滅諸心心所法是依現在之諸心心所法之無有緣為緣二四去緣者是去等無間諸心心所法是依現在之諸心心所法之去緣為緣二五不去緣者是四非有色蘊互相依不去緣為緣四大種是互相依不去緣為緣於入胎剎那之名與色是互相依不去緣為緣諸心心所法是依心等起諸色之不去緣為緣四大種是依諸所造色之不去緣為緣眼處是依眼識界及其相應諸法之不去緣為緣耳處是依耳識界及其相應諸法之不去緣為緣鼻處是依鼻識界及其相應諸法之不去緣為緣舌處是依舌識界及其相應諸法之不去緣為緣身處是依身識界及其相應諸法之不去緣為緣色處是依眼識界及其相應諸法之不去緣為緣聲處是依耳識界及其相應諸法之不去緣為緣香處是依鼻識界及其相應諸法之不去緣為緣味處是依舌識界及其相應諸法之不去緣為緣所觸處是依身識界及其相應諸法之不去緣為緣色處聲處香處味處所觸處是依意界及意識界相應諸法之不去緣為緣凡依止於某色而意界及意識界轉者其色是依意界與意識界及其相應諸法之不去緣為緣順三法發趣第一善三法第一章相緣分其一施設分二六若緣善法而善法從因緣生耶若緣善法而不善法從因緣生耶若緣善法而無記法從因緣生耶若緣善法而善無記法從因緣生耶若緣善法而不善無記法從因緣生耶若緣善法而善不善法從因緣生耶若緣善法而善不善無記法從因緣生耶二七若緣不善法而不善法從因緣生耶若緣不善法而善法從因緣生耶若緣不善法而無記法從因緣生耶若緣不善法而善無記法從因緣生耶若緣不善法而不善無記法從因緣生耶若緣不善法而善不善法從因緣生耶若緣不善法而善不善無記法從因緣生耶二八若緣無記法而無記法從因緣生耶若緣無記法而善法從因緣生耶若緣無記法而不善法從因緣生耶若緣無記法而善無記法從因緣生耶若緣無記法而不善無記法從因緣生耶若緣無記法而善不善法從因緣生耶若緣無記法而善不善無記法從因緣生耶二九若緣善無記法而善法從因緣生耶若緣善無記法而不善法從因緣生耶若緣善無記法而無記法從因緣生耶若緣善無記法而善無記法從因緣生耶若緣善無記法而不善無記法從因緣生耶若緣善無記法而善與不善法從因緣生耶若緣善無記法而善不善無記法從因緣生耶三若緣不善無記法而善法從因緣生耶若緣不善無記法而不善法從因緣生耶若緣不善無記法而無記法從因緣生耶若緣不善無記法而善無記法從因緣生耶若緣不善無記法而不善無記法從因緣生耶若緣不善無記法而善不善法從因緣生耶若緣不善無記法而善不善無記法從因緣生耶三一若緣善不善法而善法從因緣生耶若緣善不善法而不善法從因緣生耶若緣善不善法而無記法從因緣生耶若緣善不善法而善無記法從因緣生耶若緣善不善法而不善無記法從因緣生耶若緣善不善法而善不善法從因緣生耶若緣