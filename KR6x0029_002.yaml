body:
  text: 大發趣論注歸命彼世尊應供正覺者序說諸天中之天中天依天阿修羅受供養清淨禁戒者賜說雙論已賜說甚深其義法其次更於大勇第七仙名色滅者名第七而稱發趣言為極深以說論法之教今應注釋遵循次第故我當釋之汝等諦聽實依正等覺者於順發趣依二十二之三法稱為三法發趣且廣說依百之二法稱二法發趣且廣說除此之外更取二十二之三法而入百之二法中且名為二法三法發趣而闡述再取百之二法而入二十二之三法且名為三法二法發趣而詮解又同三法以入於三法中名為三法三法發趣而說明又同二法而入於二法中名為二法二法發趣而說明如是曰三法妙發趣與最上二法二法三法及三法二法或三法三法及二法二法者是順中之甚深六論法也於逆發趣亦依二十二之三法而名為三法發趣依百之二法而名為二法發趣以二十二之三法入百之二法中名為二法三法發趣以百之二法入二十二之三法中名為三法二法發趣同以三法入於三法中名為三法三法發趣同以二法入於二法中名為二法二法發趣以上如是雖於逆之發趣是依六論法而廣說故言三法妙發趣與最上二法二法三法及三法二法或三法三法及二法二法者是逆中之甚深六論法也由此更於同此順逆之方法以顯示六論法故曰三法妙發趣與最上二法二法三法及三法二法或三法三法及二法二法者是順逆中之甚深六論法其次於逆順之中同依此六論法而廣說故曰三法妙發趣與最上二法二法三法及三法二法或三法三法及二法二法者是逆順中之甚深六論法如是於順之六發趣逆六於順逆六於逆順六發趣以上總合此二十四全發趣名為發趣大論此中依彼等總合二十四全發趣而總合二十四全發趣名為發趣大論彼等並於此論之名義應先知依何義而為鉢多那耶依種種種類之緣義無論鉢之語是表種種種類之義而多那之聲是表示緣之義於處非處善性等實於緣即言多那故如是依種種種類之緣而敘述故此等二十四鉢多那中名為鉢多那又總合此等鉢多那故此論之全部應知為鉢多那有其他之理趣言依何義而為鉢多那耶依分別之義無論於施設故建立故開示故分別故而有顯示之箇處鉢多那是分別義而知故如斯善等之法是依因緣等所分別故於此等二十四鉢多那一一名為鉢多那又總合此等鉢多那故此論全部名為鉢多那應當知有其他之理趣言依何義為鉢多那耶依發趣之義言依進發義之意義於有謂由牛舍出去之牛箇處是依鉢多那之語而言出去之牛此由義而進發無論於理趣極不詳之法集論等一切智性智是無礙而進發然善等是依因緣等類而分別詳得理趣之結果一切智性智是轉無礙而進發故於此等二十四鉢多那一一名為鉢多那然總合此等鉢多那故此論全部名為鉢多那應當知此中於順當初依三法所說故名為三法鉢多那若分解其句者諸三法之鉢多那緣於此處言三法鉢多那為三法種種種類之緣於此說中之義於第二之考察諸三法之鉢多那分別即三法鉢多那依因緣等分別三法之義於第三之考察是依因緣等之類於所分別中有宗義之廣說故向三法之鉢多那發趣進發即三法鉢多那於一切智性智之無礙發動之義於二法鉢多那等亦與此同理趣於如是順以知六發趣於逆等亦依此方法應當知然於順逆順逆逆順凡此等各有六故成二十四法故言二十四之全發趣以上此等依總合全發趣而稱為二十四小發趣總合此二十四全發趣名為發趣大論然此依三法等所廣說故言三法發趣二法發趣乃至三法三法發趣二法二法發趣不觸及彼等而為顯示分別三法之諸緣於先名為論母設而說言緣分別分亦同其名此由略說與廣說二部而成因乃至不去緣者是略說略說分之釋因緣一此中言因此又為緣是因緣因故是緣依於因而言緣於所緣緣等亦與此同理趣此中因者是論之成分因由根之異名言於宗因等確實論之成分即因及世間者總之於佛教言凡因生之諸法於言等時者因者是因由於三善因三不善因等言其根即因今正確其根義又於此處緣者如次之語義緣由此而行是緣也即其不排斥而轉之義不論凡某法不排斥某法而或住或生者其後法言為其前法之緣然若由相是助成者是緣不論凡或法或法住或因生而助其成者言其前法是其後法之緣緣因因由緒緣生起出生等義同而語異如是由根之義由因助成之義言緣為纏由根義而助成法乃因緣其因緣實是對稻子等如稻殼如對寶珠之光等如寶珠之色等對於善等而成就善等之性者是阿闍梨等之意趣然若如是者於其因緣等起之諸色不得因緣性不論彼不成就彼等色之善等性故然亦非無成為因緣無論如是言因是因相應之諸法及其等起之諸色由因緣而為緣然於諸無因心若無此者其無記性者得成立又雖有諸有因心但其善等性是依如理作意等而非依相應之因然而若於諸相應因中如其自性有善等之性而此依諸相應中之因者無貪應為善或應為無記然而兩者皆有故如於諸相應因如是於諸因亦應準許善等之性然而若諸因之有根義不取善等性完成而取善安住性完成亦無絲毫障礙不論得因緣之諸法如成長有根之樹堅固而善安住但諸無因法者如胡麻芽等之水草不善安住故如是由根義而助成由善安住性完成而助成法者是因緣也所緣緣以下諸緣中由所緣而助成法是所緣緣其由色等而為六種以色處是由眼識界始復凡緣如如之法而如如之諸法即諸心心所法生如是如是之諸法是由如是如是之諸心心所法之所緣緣為緣而結論故雖任何之法亦無非所緣緣恰如力弱之士夫攀登於棒或綱而起立佇立諸心心所法是緣色等之所緣而生住故一切心心所法所緣之諸法當知是所緣緣增上緣由其本義而助成法乃增上緣彼由俱生與所緣二種此中欲增上是由欲相應之諸法及其等起諸色之增上緣為緣等之語名為欲勤心觀之四法當知是俱生增上緣然而非同為增上因為以欲為主首之心轉時欲增上而其他不然故其餘亦與此同理趣然而著重某法而諸非色法轉者彼與其等之非色法之所緣增上故本文所言凡以如如之法為主而如如之諸法即諸心心所法生者如是如是之諸法是由如是如是之諸心心所法之增上緣為緣無間緣由無間而助成法是無間緣由等無間而助成法是等無間緣此二緣雖作種種之戲論但此處之要義如次凡眼識之次必是意界意界之次必意識界等心之規則不外是由前前之心力而成立是故於各各自己之次對所應之心生令生起可能之法是無間緣由此而言無間緣者是由眼識界及其相應之諸法意界及其相應諸法之無間緣為緣等無間緣無間緣是等無間緣因為雖此處唯名稱之別但如於集與相續增語與訓釋之二等其意義則無別雖然阿闍梨等思事無間性故是無間緣時無間性故為等無間緣但其由滅盡定出者非想非非想處善是由果等至之等無間緣為緣所說不同再者此處所言諸法等起能力性未失但由修力令遮止故諸法於等無間不生起此乃正確證明時無間性之不存在因為言由修力故其處無時無間性於此我等所主張無時無間性故言等無間緣者不合道理時無間性故言有等無間緣乃彼等之宗義故不豫執著此處應結論為唯名稱有別種而由意義則無別何故耶此等言無中間乃無間無餘地故言完全無間是等無間俱生緣自之所生時依俱生性而助成他之法是俱生緣恰如光對燈彼由非色蘊等而有六種如本文言四非有色蘊依互相俱生緣為緣四大種是於互相於入胎剎那之名色是互相諸心心所法是依心等起之諸色四大種是依諸所造色諸有色法是於諸非有色法或時由俱生緣為緣或時不依俱生緣為緣此乃正指心所依而言互相緣令互相生起依支持合性質而助成法乃互相緣互相合持如三杖彼依色蘊等而有三種如本文言四非有色蘊是依互相緣為緣四大種互相又於入胎剎那名色是依互相緣為緣依止緣依住處作依止作而助成法是依止緣恰如樹木繪畫等對大地布帛文中言四非有色蘊是由互相依止緣為緣如是於俱生而述依同理趣當知然而於此處第六之部分言眼處是依眼識界耳鼻舌身處是依身識界及其相應之諸法之依止緣為緣凡依止於某色而意界及意識界若轉者其色依意界與意識界及其相應之諸法之依止緣為緣如是分別親依止緣言親依止緣者然於此處且作如下之語義依彼等而轉由自果而令依止且不拒絶是為依止又如激烈煩惱為激惱強力之依止是親依止此是強因緣因由之同義語故以強力因緣之性質而助成法當知是親依止緣有所緣親依止無間親依止本性親依止之三種此中言以布施受戒作布薩業重之而省察重前之諸善行而省察從靜慮出重之而省察靜慮諸有學重之而省察進姓重之而省察清淨諸有學從道出重之而省察其道依如是等之論法且所緣親依止是與所緣增上不區別而分別此中凡重某所緣而諸心心所法生者此決定其等心心所法之所緣中有強力所緣如是唯由應重之義而所緣增上唯依強力因由之義為所緣親依止如是當知此等之區別無間親依止亦依前前之諸善蘊依後後諸善蘊之親依止緣為緣等之論法與無間緣不區別而分別於設置論母彼等之中對無間緣而言眼識界及其相應之諸法是由意界及其相應之諸法之無間緣為緣等之論法又對親依止緣而言前前之諸善法依後後之諸善法之親依止緣為緣等之論法親依止出故雖有設置之別而其意義亦唯一而已雖然於各自之後起所應之心生起可能性之故無間性而後心生起之時前心由有強力性而當知是無間親依性譬如因緣等中任何法即使無心亦生起如是自己無無間心無而心之生起決無是事是故為強力之緣如是適應於各自之無間後心之生起為無間緣依強力之因由為無間親依止緣此等之區別者如是應知再者本性親依止是所造之親依止乃本性親依止起名為所造是自相續中生或所修習之信戒等或時節食等或依本性為親依止本性乃親依止所緣親依止無間親依止者不可混淆其義其本性親依止是以信為親依止而布施受戒作布薩業而起靜慮觀道等至親依止於戒聞施捨慧而布施乃至起等至然有時信戒聞施捨慧是依信戒聞施捨慧之親依止緣為緣等之理趣有許多種類應當知以上信等即是正本來性質之故及依強力因由之義而為親依止如是言本性親依止前生緣依先而生轉之性質助成法是前生緣其依於五門之所依所緣心所依而有十一種如本文言眼處由眼識界及其相應諸法之前生緣為緣耳鼻舌身色聲香味所觸處是依身識界及其相應之諸法之前生緣為緣色聲香味所觸處是依意界及其相應諸法之前生緣為緣若凡依止於某色而意界及意識界轉者其色是依意界及其相應諸法之前生緣為緣意識界及其相應之諸法者有時依前生緣為緣有時不依前生緣為緣後生緣對諸前生之色法依支持義而助成非色法是後生緣如對於貪兒童之身體而求食之思依本文言後生之諸心心所法是依前生此身之後生緣為緣修習緣依修習之義對諸直後法之德強力性而助成法是修習緣如於典籍等之預習其依善不善唯作證用而有三種如本文言前前之諸善法是依後後之諸善法之修習緣為緣前前諸不善法乃至諸唯作無記法是依後後之唯作無記法之修習緣為緣業緣言心加行依作用性而助成法是業緣其依異剎那善不善之思及俱生一切之思有二種如本文言善不善業是依異熟之諸蘊及業果諸色之業緣為緣思是依諸相應法及其等起諸色之業緣為緣異熟緣依不勤寂靜性而不勤寂靜性助成異熟法是異熟緣其轉之時心等起之諸色及於結生之時為業果之諸色復常依其相應諸法是異熟緣如本文言異熟無記之一蘊是依三蘊與諸心等起色之異熟緣為緣乃至於結生剎那異熟無記之一蘊依三蘊三蘊是依一蘊乃至二蘊是依二蘊與諸業果色之異熟緣為緣諸蘊是依所依之異熟緣為緣食緣於由諸色非色支持之義而助成四食是食緣如本文言段食者是依此身之食緣為緣諸非有色食是依諸相應法及其等起諸色之食緣為緣復於問分亦言結生剎那諸異熟無記之食是依諸相應蘊及諸業果色之食緣為緣根緣依增上之義而助成女根男根二十根是根緣此中眼等之五是唯諸非色法其餘是諸色非色法之緣如本文言眼根是依眼識界之根緣為緣耳鼻舌身根是依身識界及其相應諸法之根緣色命根是依諸業果色之根緣為緣諸非有色根是依相應之諸法及其等起諸色之根緣為緣復於問分亦明於結生剎那異熟無記之諸根是依諸相應法與諸業果色之根緣為緣靜慮緣二種之五識中除身之樂苦二受依審慮之義而所助成有善等之別一切之七靜慮支是靜慮緣如本文言諸靜慮支是依靜慮相應之諸法及其等起諸色之靜慮緣為緣復於問分亦述於結生剎那諸異熟無記之靜慮支是依諸相應蘊與諸業果色之靜慮緣為緣道緣依由何處彼處誘導之義而助成善等之別十二道支是道緣如本文言諸道支是依道相應之諸法及其等起諸色之道緣為緣復於問分亦述於結生剎那諸異熟無記之道支是依諸相應蘊與諸業果色之道緣為緣復此等靜慮與道是如名於諸二種五識無因心中不得是應當知相應緣言依同一所依同一緣同一生同一滅之相應性而助成非色法是相應緣如本文言四非有色蘊是依互相相應緣為緣不相應緣不依同一所依等之性而助成諸有色法是依諸非有色法又諸非有色是依諸有色之不相應緣為緣彼依俱生後生前生三種因為如是言故俱生之諸善蘊是依諸心等起色之不相應緣為緣後生之諸善蘊是依前生此身之不相應緣為緣然而無記句於俱生分別亦明於結生剎那諸異熟無記蘊是依諸業果色之不相應緣為緣諸蘊是依所依所依是依諸蘊之不相應緣為緣再者前生是依眼根等之所依亦同應當知如本文言前生之眼處是依眼識乃至身處是依身識之不相應緣為所依是依諸異熟無記唯作無記蘊諸善蘊諸不善蘊之不相應緣為緣有緣依現在相依有性為同法支持之義而助成法是有緣因此依非色蘊大種名色心心所大種處所依而設置七種之論母如本文言四非有色蘊是依互相有緣為緣四大種是依互相於入胎剎那之名與色是依互相諸心與心所法為心等起之諸色四大種是依諸所造色眼處是依眼識界身處色處所觸處是依身識界及其相應諸法之有緣為緣色處乃至所觸處是依意界及其相應諸法之有緣為緣若凡依止於某色而意界及意識界轉者其色是依意界意識界及其相應諸法之有緣為緣復於問分亦設置俱生前生後生食根先於俱生者一蘊是依三蘊與諸心等起色之有緣為緣等之理趣而所廣說於前生依前生之眼等而廣說於後生是由前生之此身依後生之諸心心所之所緣而廣說又於諸食根段食是依此身之有緣為緣色命根是依業果諸色之有緣為緣如是應廣說無有緣自直後生之諸非色法以依轉之餘地而助成於諸等無間滅之非色法是無有緣如本文言於等無間滅之諸心心所法是依現在之諸心心所法之無有緣為緣去緣同彼等非色法者是已去而助成故是去緣如本文言等無間而去之諸心心所法是依現在諸心心所法之去緣為緣不去緣諸有緣法是依不去而助成故應知為不去緣然而此處修飾教說或為教導所化以說此二法恰如已說有因之二法而所說因相應之二法為以上此等二十四緣不曖昧由法與由時及由種種種類之分別以及由緣所生而判別應當知此中由法實是此等諸緣中初因緣是諸名色法中名法之一分所緣緣是與施設非有皆是一切之名色法於增上緣中俱生增上是名法之一分業靜慮道緣亦然所緣增上是應為一切主要之所緣法無間等無間後生修習異熟相應無有去緣是唯名法涅槃乃非所攝故亦言為名法之一分前生緣是色之一分其餘如所應之名色法以上如是此中先由法判別應當知由時者此中現在之緣是十與五過去是五一者依止於二時三者正綿延三時以及由時有所離實此等之中因緣俱生互相依止前生後生異熟食根靜慮道相應不相應有不去緣以上此等十五緣是唯現在法無間等無間修習無有去緣之五是唯過去法然而業緣之一皆依止於現在過去之二時其餘所緣緣增上緣親依止緣以上此等三緣是經三時與施設俱涅槃所攝故由有時而離以上如是此處亦由時應判別而知言自種種種類之分別由緣生此二句之義於廣說分應明之緣廣說分之釋因緣廣說二然今略說其等緣全分從順序而示廣說言因緣者是諸因因相應之諸法及其等起諸色之因緣為緣等此中言因緣者從二十四緣之中所設置之順序首先提出應分別之句於餘之諸緣亦依此理趣第一將提出應分別之句以解答應當知又此處句之關係者如是於緣略說是因緣之略說若廣說者言因是依因相應之諸法及其等起之諸色之因緣為緣如是應當知依此種方法於一切緣當知所分別句與答之關係所言令之諸因是依因相應之諸法此時不言因相應之諸法何故言因是依因相應之諸法耶為確定能緣與諸緣所生因為言因相應之諸法時可得與因相應諸法之因緣為緣之義若如是則言如是如是名之法是依因緣為緣及能緣之決定應知之再者與因相應之諸法即因相應之諸法不如是解釋而亦得因依一切相應法之因緣為緣若如是者與因不相應之眼識等亦與因相應善等皆同是相應法也此時此因名為如是如是之相應法之緣如是緣所生之決定應不可知故為決定能緣與緣所生言因是依因相應之諸法其義即對因相應善等之諸法一切相應之因是依因緣為緣此處又不言緣依因緣語是由因遮止其他之緣性故因為此因是由因緣或由俱生等之緣為緣於此處由因之俱生等遮止其他緣性故言依因緣也雖如是不言依其相應之諸法何故言依因相應之諸法耶不明應廣說故因為言依其相應之諸法時彼等所言其相應法者此實是不明此其不明故彼等與其相應故而言其相應之諸法為顯示其正確具體性而言依因相應之諸法也言依其等起之諸色者此時然為應明廣說故而言其此處之義如是其等因與因相應之諸法同可言是此等色之等起起因而其等起之諸色此等是依其等起之諸色由因並由因相應之諸法而生之義依此而言心等起之色然此由心以外者亦等起耶然等起因為一切心心所是成一而令色等起故但是從世間之說明心之勝性故如是種類之色是言心等起正因此故言諸心心所法是依心等起諸色之俱生緣為緣又若如是者於此處亦言依其等起之諸色何故不言依心等起之諸色耶亦攝諸非心等起之色故因為於問分結生剎那之諸異熟無記因是由諸相應蘊及諸業果色之因緣為緣為攝彼於此處不言心等起之諸色而言其等起之諸色其義是其等因及因相應法雖不生心生色但由俱生等緣而言與此等之等起因而於其等起之諸色此等與其等起之諸色轉時之諸心生色及結生時之業果諸色之因是依因緣為緣於其他其等起之諸色時亦依此方法而應知其義然而此因何故於結生之時唯依諸業果色之因緣為緣而轉時不然耶於結生時諸業果色之心繫屬轉性故因為於結生時諸業果色心繫屬故而轉依心之力而生住故於其剎那心雖不能令生心生色但彼等業果色是無心則不能生住正是此故緣識而有名色其識住時有名色之住胎然而於轉時雖有心彼等業生色之轉完全是業繫屬故而非心繫屬之故因此又入滅盡定之人人其人人為無心時亦同是生起業生色也然而何故於結生剎那心不能令生心生色耶是業力所引性故無安住所依性故及無力性故此其時依業力所引非前生所依故因此若無安住所依者如是則無力是故恰如剛墜落懸崖之人任何事亦不能為不能生其色然而業生色是對於心正是有心等起色之位置又心對業生色而言有種子位業是依業生色如田地煩惱者如水是故雖有田地及水但由初生之時如種子之力樹木生結生之剎那由心力而色身生然而種子離時又由地水之力而迅速成長雖是無心唯由業諸業果色轉者應知又如是言業如田地識如種子渴愛如濕潤然又此義是由容有而應理解所以三容有是名容有色容有名色容有此中無色有是言名容有因為於其處唯心所依而無色緣唯諸非色法生無想有是言色容有因為於其處唯結生心而無非色緣唯諸色法生起五蘊有是言名色容有因為於其處結生時唯無所依者諸非色法不生又無結生心不生業生之諸色法唯是結合諸色非色法生譬如有主人有王有門衛之家初雖無王命不能入後即無命令亦依初命令之力而入正是如此於五蘊有無結生識俱生等之緣性者色不決由結生而始生然後如無結生識俱生等之緣力但已得入色是由業前力之影響而轉又無想有是無非色容有故於其處雖無非色緣而非想容有故色轉時如人入無主之空家或入自家無色有亦非色容有故於其處完全無色緣而知容有性故諸非色法轉但是五蘊有雖是色非色容有於此處若無非色緣結生之剎那諸色不生如是此因是唯於結生時由諸業果色之緣而轉時者不然又言因是依諸俱生之因緣為緣時又此義完全非謂耶然而何故言依因相應之諸法及其等起之諸色耶是否定轉時之業果色等之緣因此若如是者一切轉時與因同一剎那生之諸業果色並對時節食等起色謂因應亦是因緣然而因對其等不為緣是故為對其等緣性之否定應如是知此之謂今謂由種種性類之別由緣生由此句應知此處之判別由種種性類之別者是實言此因由種類而為善不善異熟唯作之四種此中善因是由地之不同由欲界繫等之別而為四種不善因是唯欲界繫異熟因由欲界繫等之別而為四種唯作因是欲界繫色界繫無色界繫之三種此中欲界繫善因是名無貪等三種於色界繫等之善因亦與此同理趣不善因是由貪等而為三種又異熟因唯作因是由無貪等而各為三種然各各因與心相應於各各諸因有種種性類之別如是最初於此處應由種種性類之別判別而知謂緣生者是由此緣而是等之諸法生確實與是等之諸法此即是緣如是判別應了解之義此中先於此因緣之欲界繫善因是於欲有色有諸與自己相應之諸法與諸心等起色之因緣於無色有唯與諸相應法而已色界繫善因是唯於欲有色有與諸相應法及心等起諸色之因緣無色界繫善因是等於欲界繫善因非所攝善因亦然不善因亦然然而欲界繫異熟因唯於欲有與自己相應之諸法於結生時與諸業果色又轉時之心等起諸色之因緣又色界繫異熟因者即在色有唯為所言性類之因緣又無色界繫異熟因是於無色有言唯與性類之因緣又無色界繫異熟因是於無色有唯與諸相應法之因緣非所攝異熟因是於欲有色有與諸相應法及心等起之諸色於無色唯依諸非色法之因緣又於三地之唯作因是等於緣之理趣善因如是此處由緣所生亦應判別而知所緣緣廣說三於所緣緣廣說色處者即稱色為處於其餘亦與此同理趣謂眼識界者是稱眼識為界於其餘亦同此理趣謂其相應之諸法是與其眼識界相應之受想行三蘊再者完全以眼識為所依之受想行識之四蘊色處依所緣緣為緣之義於以後亦與此同理趣謂意界者是為相應法之三種意界色處等之五是由所緣緣為緣而非於一剎那一切諸法者是此等色處等之五與其餘全所知法者除此等六界眼識界乃至意界餘為相應法之意識界依所緣緣為緣之義謂凡緣如如法者是由此言凡此等七識界之所緣法之彼等是為彼等七界之所緣故七界生於其剎那明為七界之所緣緣雖非合為一起各緣於某法而各某諸法生者其各諸法為分別明各諸法之所緣緣謂生者如川流山立之謂含括一切時而如是言應知也再者依此或緣於諸法或諸法已生或諸法當生其等全正是由所緣緣而言已生當生而成立謂諸心心所法者是言如如之諸法是示法之具體謂如是如是之諸法者是各諸所緣法言為如是如是之諸心心所法者是為各諸心心所法此最初此處本文之注釋然謂此之所緣者將以上之色所緣聲所緣香所緣味所緣所觸所緣法所緣等分類則為六種此中除施設之外若由地者分為欲界繫乃至非所攝之四種此中欲界繫是由善不善異熟唯作色之別而為五種色界繫是由善異熟唯作等而為三種無色界亦然非所攝是由善異熟涅槃等而為三種或是全由善不善異熟唯作色涅槃施設等之別而為七種此中善是由地之別為四種不善是唯欲界繫異熟是四地所有唯作是三地色是一地唯欲界繫涅槃者亦是一地是非所攝施設是離地以上如是此中由種種性類之別而判別應了知然而如是所分別此所緣之中欲界繫善所緣是由欲界繫善色界繫善不善欲界繫異熟欲界繫唯作及色界繫唯作以上此等六聚之所緣緣為緣色界繫善所緣於此等六聚中除欲界繫異熟之外為五聚之所緣緣無色界繫善所緣是由欲界繫善色界繫善無色界繫善不善無色界繫異熟欲界繫唯作色界繫唯作無色界繫唯作以上此等八聚之所緣緣非所攝善所緣者為欲界色界者唯依善與唯作之所緣緣不善所緣者是依欲界繫善色界繫善不善欲界繫異熟欲界繫唯作色界繫唯作以上此等六聚之所緣緣欲界繫異熟所緣者為欲界繫善色界繫善不善欲界繫異熟欲界繫唯作色界繫唯作以上此等六聚之所緣緣色界繫異熟所緣者為欲界繫善色界繫善不善欲界繫唯作色界繫唯作以上此等五聚之所緣緣無色界繫異熟所緣亦同為此等五聚之所緣緣非所攝異熟所緣者為欲界色界者諸善與唯作之所緣緣欲界繫唯作所緣者為欲界繫善色界繫善不善欲界繫異熟欲界繫唯作色界繫唯作以上此等六聚之所緣緣色界繫唯作所緣者是此等六聚中除欲界繫異熟之外為五聚之所緣緣無色界繫唯作所緣者為其等五聚及無色界繫唯作以上此等六聚之所緣緣言四等起色蘊之色所緣者為欲界繫善色界繫善不善欲界繫異熟欲界繫唯作色界繫唯作以上此等六聚之所緣緣涅槃所緣者為欲界繫善色界繫善為非所攝之善異熟欲界繫唯作及色界繫唯作以上此等六聚之所緣緣色界繫善與唯作或者不許從其道理應了知然而種種種類之施設所緣為三地之善不善色界繫異熟無色界繫異熟三地之唯作以上此等九聚之所緣緣此中各各或所緣或緣各各之諸法者則各各之諸法乃為各各之緣所生如是此中由緣生亦判別可了知增上緣廣說四在增上緣廣說謂欲增上言欲為增上以欲為首以欲為主於心生起之時生欲作之欲望乃是名其餘亦與此同理趣然而何故於因緣廣說如言因是因相應之諸法如是於此處不言增上是增上相應之諸法而由欲增上是由欲相應之諸法等之論法而作說於一剎那非有故因為於前之論法二三因於一剎那亦是因緣由根之義不捨助成之性質故然而增上雖由最勝之義而助成但於一剎那不名多最勝是故雖合一而生起者彼等於一剎那無增上緣之性質其增上緣性非有於一剎那故此處作如是說如是示俱生增上今當示所緣增上先以如如之法為主等此中如如之法者是各各某所緣法為主者是尊重尊敬或者領略滋味或者作重大重要可得不可捨不可侮者如是如是之諸法者是應令各各主之諸法如是如是之諸心心所法者是為各各主之諸法也由增上緣者是依所緣增上緣為緣此先此處本文之注釋然而名此處增上是由俱生與所緣二種此中俱生是由欲等而有四種彼等任何之一一是由欲界繫等而由地有四種此中欲界繫是善不善唯作之三種然於此處若得不善是不得觀增上色界繫無色界繫是由善與唯作而二種非所攝是由善異熟而二種再者所緣增上是由性類之別而有善不善異熟唯作色涅槃等六種以上如是於此處由種種性類之別以判別應了知然如是所分別之俱生增上中先稱欲界繫善唯作之增上是當於二因三因心之生以欲等任一為主而生時與自相應之諸法及為心等起色之增上緣於稱色界繫善唯作者亦與此同理趣然此乃於此處一向全得因為彼等色界繫之諸法是無俱生增上則不生故言無色界繫善唯作者然於五蘊有則全等於色界繫增上然於四蘊有唯諸相應法為增上緣於其處生起之欲界繫增上亦然非所攝不論是善是異熟於五蘊有一向全依諸相應法及心等起之諸色之增上緣於四蘊有唯色法而已不善增上是於欲有之邪性決定於心一向與諸相應法及心等起諸色為增上緣不定是於欲有色有於自增上時則同心等起色及相應法於無色有唯依諸非色法為增上緣此先於俱生增上之理趣然所緣增上中欲界繫善之所緣增上是依欲界繫善貪俱行不善以上此等二聚為所緣增上緣於色界無色界有善所緣增上亦與同此理趣然非所攝善之所緣增上者於欲界與智相應善及智相應唯作為所緣增上緣再者名不善所緣增上者言貪俱行心生其唯貪俱行不善為所緣增上緣又欲界繫之異熟所緣增上是唯貪俱行不善為所緣增上緣色界無色界之異熟所緣增上亦然然出世間之異熟所緣增上於欲界是唯諸智相應之善唯作為所緣增上緣又欲界繫等分別三種之唯作所緣增上亦貪俱行不善為所緣增上緣名四等起色之色蘊所緣增上是唯貪俱行不善為所緣增上緣涅槃者於欲界與智相應善智相應唯作出世間善出世間異熟以上此等四聚為所緣增上緣如是於此處由緣生之判別應了知無間緣廣說五於無間緣廣說意界者是異熟之意界意識界者是由推度作用之無因異熟意識界又依此應言更建立證用彼所緣有分作用之意識界彼等雖非有言是由此理趣應知以示理趣而略說於前前之諸善法等之六理趣其等所攝故復於此處不說應了知此中謂前前之諸善法是又於六門應見過去於無間直前之諸善證用法後後之諸善法者是於無間直後生之諸法諸善法者是相等於諸善法諸無記法者是然此於善之無間由得彼所緣有分果而說以不善為根時言諸無記法者是同名為彼所緣有分之諸法於以無記為根時諸無記法者由向轉證用或由有分而轉為諸唯作異熟無記法由唯作意界出發乃至建立作用之意識界止對轉時之經路心亦得同此理趣為諸善法者於五門建立無間直後意門之者是意門向轉之無間為最初之諸證用言諸不善法者於句上亦同此理趣言如是如是之諸法者又是一切無間緣法之略相以上是最初此處本文之注釋然此名無間緣是除涅槃之外而應正知知四地之非色法聚此對其性類由善不善異熟唯作之別而分為四種此中善是由欲界繫等之別而為四種不善是唯欲界繫異熟是屬於四地又唯作無間緣是屬於三地以上如是此處由種種性類之別而判別應了知然如是所分別中欲界繫善是與自相等之欲界繫善為無間緣然智相應之欲界繫善是色界繫善無色界繫善及出世間繫善等以上三聚為無間緣欲界繫善是欲界繫異熟色界繫異熟無色界繫異熟及出世間繫異熟等以上以此等四聚為無間緣色界繫善是與色界繫善與智相應之欲界繫異熟及色界繫異熟等以上以此等三聚為無間緣無色界繫善亦不例外與彼等之二異熟及自之善異熟等以上以四聚為無間緣然別於此中非想非非想處善名不還果與出世間異熟為無間緣出世間善是唯出世間異熟為無間緣不善亦不例外與不善及善異熟不善異熟然別而此中之樂受相應中性受相應之不善是色界繫無色界繫異熟者等以上亦以此等四聚為無間緣欲界繫異熟是為欲界繫異熟智相應或智不相應異熟是為欲界繫唯作向轉然此中之智相應異熟是由結生而生色界繫無色界繫異熟者等以上亦以此等四聚為無間緣色界繫異熟是為有因欲界繫異熟色界繫異熟無色界繫異熟及欲界繫唯作向轉等以上以此等四聚為無間緣無色界繫異熟是為三因欲界繫異熟無色界繫異熟及欲界繫唯作向轉等以上以此等三聚為無間緣出世間異熟是為三因欲界繫異熟及色界繫無色界繫出世間異熟等以上以此等四聚為無間緣欲界繫唯作是為欲界繫善不善四地之異熟及三地之唯作等以上以九聚為無間緣色界繫唯作是為三因欲界繫異熟色界繫異熟及色界繫唯作等以上以三聚為無間緣無色界繫唯作是為三因欲界繫異熟色界繫無色界繫出世間異熟及無色界繫唯作等以上以五聚為無間緣如是於此處亦由緣生而判別應知等無間緣廣說六等無間緣廣說完全與此同理趣然此二緣是大廣說是故若對一切心生起而考察者彼等之廣說當可理解俱生緣廣說七於俱生緣廣說互相者是他與他之故由此此等二法於一剎那明能緣於同時為緣所生於入胎剎那者是五蘊有之結生時因此於那一剎那之間如名色來進入由他世來此世如入而生是故其剎那言為入胎剎那此種時色者是唯心所依之意義因此彼者為名名者為彼滿足互相俱生緣之義故諸心心所者是轉時之四蘊由俱生緣者是此中心等起之諸色是為諸心心所不能滿足能緣之義是故非言互相諸所造色對四大種亦然諸有色法者是依諸非有色法者是心所依為四蘊某時者是若干之時由俱生緣為緣者是指結生之時而言不依俱生緣為緣者是指轉時而言然此四非有色法是由互相俱生緣為緣如是由六類而建立此中三類是由互相而言三是非由互相此中於最初之部類非色是能緣而且為緣所生於第二色即是於第三是名與色於第四非色為能緣而色是緣所生於第五能緣緣所生亦是色於第六色是能緣非色是緣所生以上是此處本文之注釋然此俱生緣是由性類而分為善不善異熟唯作色等以上之五種此中善是由地為四種不善唯一種異熟是四種唯作是三種色是唯欲界繫一種如是最初此中由種種性類之別而判別應了知又如是所分之此中四地之善任於五蘊有皆與自相應之諸法及心等起之色為俱生緣不善者亦然又此中凡於無色界所生者唯依非色法為俱生緣欲界繫色界繫異熟是依心等起之色及諸相應色為俱生緣尚且此中凡非等起之色唯為諸相應法一切生於結生時者亦依諸業果色為俱生緣無色界繫異熟是唯依諸相應法出世間異熟是於五蘊有依諸相應之法及心等起之諸色於四蘊唯依非色欲界繫無色界繫唯作是於五蘊有依諸相應之法及心等起之諸色為俱生緣於四蘊唯依諸非色色界繫唯作一向依諸相應之法及心等起之諸色為俱生緣於四等起色中之業等起色一大種依三三是依一二是依二大種者四大種是依所造色為俱生緣於欲界色界之結生剎那之所依色是依諸異熟蘊之俱生緣為緣然於時節心食等起色四大種是於互相並依所造色之俱生緣為緣如是此處亦由緣生而判別應了知互相緣廣說八於互相緣廣說之本文依俱生緣廣說前三類而明示對此於彼處所敘述完全相同於注釋之意義不再說明又此之互相緣亦依性類而分別善不善異熟唯作色等以上五種此中善是由地而為四種一切全等於前如是此處由種種性類之別而判別應了知尚且如是所分別之此中一切四地之善復由與自相應之諸法之互相緣為緣不善亦然然於異熟者欲界繫異熟色界繫異熟於結生時依所依色轉時唯依諸相應法無色界繫異熟出世間異熟是唯依與自相應之諸法之互相緣為緣一切之唯作亦唯依諸相應法之互相緣為緣於四等起色中之業等起一大種是依於三三是依於一二是依於二大種之互相緣為緣於欲界結生時所依色是依諸異熟蘊之互相緣為緣於諸時節心食等起色四大種是同依四大種之互相緣為緣以上如是此處亦由緣所生而判別應了知依止緣廣說九於依止緣廣說依俱生緣廣說之前五類而明示俱生依止之理趣又依第六類前生依止之理趣而說故始於眼識是依眼識界等此中依止於某色者是指所依色而言因為依止於彼除三種意界與無色之異熟七十二種之意識界與以上之七十五心轉者以上是最初此處本文之注釋此依止緣亦由性類善等之別而分為五種此中善是由地而為四種不善唯一種異熟為四種名為唯作是三種色唯一種如是此處由種種性類之別而判別應了知然如是所分別之此中四地之善任何在五蘊有皆依諸相應之蘊及心等起色之依止緣為緣不善者亦然然此中凡於無色界所生者唯依諸非色法之依止緣欲界繫色界繫異熟者於轉時依諸相應法及心等起之色於結生時亦依業果色之依止緣為緣無色界繫異熟唯依相應之諸法出世間異熟是於五蘊有依諸相應法及心等起之色者於四蘊有唯依諸非色欲界繫色界繫唯作是於五蘊有依諸相應法及心等起之色為依止緣於四蘊有唯依諸非色色界繫唯作是於五蘊有一向依諸相應法及心等起之色為依止緣四等起色之中於業等起色一大種是依於三三是依於一二是依於二大種四大種依諸所造之色所依色於五蘊有依四地之善不善除無色之異熟及二種五識依其餘三地異熟三地之唯作等以上是此等四法聚之依止緣眼處等之五依與俱相應之眼識等為依止緣於時節心食等起然四大種是依四大種及所造色之依止緣為緣如是此處由緣生之判別應了知親依止緣廣說一於親依止緣廣說前前之諸善法者是於無間親依止謂等無間過去之諸法於所緣親依止本性親依止對種種之經路而由前諸法之謂言依善而善生之語句雖然可能成為彼等三聚然言由善而不善生之語句不適當於過去於等無間之諸法是故言依若干不善法之親依止緣為緣其理由是善法依不善法之親依止緣為緣曰所緣親依止與本性親依止也所緣親依止以布施受戒作布薩業而尊重味著歡喜尊重而貪生見生尊重味著歡喜前之諸善行尊重而貪生見生從靜慮出尊重味著歡喜靜慮尊重而貪生見生本性親依止於信親依止而語慢執見親依止於戒聞施捨慧而語慢執見信戒聞施捨慧依貪瞋癡慢見欲願之親依止緣為緣指此種理趣而說由善法而無記法生之語句三聚同有可能由不善法而不善法生語句亦然然由不善法而善法生之語句不適當於等無間過去之諸法故言依若干之善法者之親依緣為緣此由不善法依善法之親依止緣為緣本性親依止親依止於貪而布施受戒作布薩業起靜慮起觀起道起通起等至親依止於瞋癡慢見欲願而布施乃至起等至貪瞋癡慢見欲願依信戒聞施捨慧者之親依止緣為緣殺生已為避此而布施等之理趣於問分指所出之本性親依止而說又不善是不依善之所緣親依止何故重於不善而善不轉故如無間親依止於此時亦應不得所緣親依止可了知依不善而無記生之語句決不得所緣親依止因為諸無記法不重不善故然無間性所得故於此處不可言依若干然依無記於無記善不善之三論法皆正得與三親依止謂補特伽羅牀座此二是依本性親依止而說因為此二依善不善之生起為強力緣然其緣性此處由經之說法而可知此是此處本文之注釋然此名為親依止緣是一分之施設與俱一切四地之諸法然若分別者依所緣親依止等而為三種此中所緣親依止是與所緣增非別種如是依前所述之理趣對種種性類應當理解無間親依止與無間緣非別種其正依前述之理趣對種種性類當理解為彼等故依彼處所述之理趣亦由緣生而判別可了知然本性親依止是由性類而依善不善異熟唯作色之別而為五種尚且由善等地之別而為種種如是先於此處由種種性類之別而判別應了知又如是所分別之此中三地之善皆依四地之善不善異熟唯作等以上之四聚之本性親依止緣出世間是唯不依不善之本性親依止然言因吾等依阿闍梨成就出世間法依此理趣而依他人不善本性親依止緣或言凡某人生於無上解脫而起嫉妒者由此理趣正是本性親依止又不善是依一切四地諸蘊為本性親依止三地之異熟亦然於出世間異熟下之三果唯不依不善之本性親依止緣最上果者亦不依善本性親依止緣然依前之理趣而為他人者或是於某人相續中將生一切出世間異熟是依一切善等之非色蘊等為本性親依止名唯作亦同依四地不善等蘊為本性親依止名為色者亦然然色自己依於此發趣大論所表現之理趣可得親依止緣不能不說依經之說法如是此處亦由緣所生而判別應了知前生緣廣說一一於前生緣廣說前生緣者於此處名為前生者對於某者而為緣由其前而生越生之剎那而達住之剎那眼處等者依所依前生而說色處等者是依所緣前生而述某時是依前生緣指其轉時而說某時是依前生緣而不為者是指結生時而說如是於全五門是由所依與所緣而述於意門由所依此本文全然不提然於問分所緣前生諸有學或異生由無常苦無我以觀其眼而說故於意門亦正得所緣前生然此處以留餘地而作說此最初此處本文之注釋然此前生緣即純唯是色又此實越生之剎那而達住不外是十八種之壞色彼一切又有所依前生與所緣前生之二種此中眼處身處所依色者此名為所依前生餘此本文所述與非所述者是色聲香味四界三根段食等以上十二種之色名為所緣前生以上如是此處由種種性類之別而判別了知然如是所分別之此中眼處是依二種眼識之前生緣為緣其他之四亦依二種之耳識等亦然然所依色是除二種五識及四種之無色界繫異熟其餘由一切四地之善不善無記心心所法為前生緣又色等之五所緣是依二種五識及諸之意界一向於前生緣尚且又此十八種之壞色是依欲界繫善於色界通善不善彼所緣欲界繫異熟欲界繫唯作於色界通唯作以上六聚為前生緣以上如是亦由緣所生而判別應了知後生緣廣說一二於後生緣廣說後生者是凡對身之諸緣於其身已生而住時生依前生者是比其等之生起更早生越生之剎那而達住者此身者者為四等起三等起大種所造色之身又此處言三等起之身者非食等起故是梵衆天等之身也當了知以上此本文之注釋然此名後生緣者略而言之是除無色界繫異熟是四地之非色蘊此為性類由善不善異熟唯作之別分別為四種如是此處由種種性類之別而判別應當知然如是所分別之此中於五蘊有生四地之善及不善者是依生之剎那過後而達住之四等起三等起之色身之後生緣於異熟亦除結生之異熟其餘之欲界繫色界繫異熟是一向依同者之後生緣於五蘊有所生之出世間異熟亦依同者之後生緣於五蘊有所生之三地唯作亦同依已述性類之身者之後生緣如是此處亦由緣生而判別應了知修習緣廣說一三於修習廣說謂前前諸之者於全理說同應視為等無間過去法然此處何故如於無間緣前前之諸善法是依後後之諸無記法等之理趣而所分別不言與性類俱廣說乃不能取自趣故因為於無間緣所分別之性類依所分別之性類修習之德令完成熟練強力之性質不能取趣名為自善等之性是故彼等不俱廣說凡由名為習氣之修習而以更熟練更強力之殊勝性即可得取名為自善等之性與彼等同性類者俱廣說應當知然異熟無記者何故言不謂耶由於非修習故因為異熟者依業而得異熟性業所回向而轉不勤無力也更依其修習之功德而令得自己之自性圓滿決不令其生其他之異熟又亦不得生前異熟之力又業力所引而生如落下險崖於異熟言全無修習之意義依無修習而異熟是無所謂又此善不善唯作之無間生者於業繫屬轉故若不取修習之德雖與善等非依為修習緣尚且又此等亦決無異種性又由地由所緣決不是異種性故欲界繫善唯作依大善唯作又以行所緣之隨順善即正依涅槃為所緣之進姓地善之修習緣也此上此本文之注釋然此修習緣先為性類是善不善唯作無記以上三種此中善是由地而有欲界繫色界繫無色界繫以上三種不善唯欲界繫唯作無記是欲界繫色界繫無色界繫以上同為三種出世間不名為修習緣如是此處由種種性類之別而判別應了知然如是所分別之此中欲界繫善是依同自己無間之欲界繫善又此中凡與智所相應者依與自相等受之色界善無色界善出世間善以上是此等聚之修習緣又色界繫善是唯依色界繫善無色界繫善是唯依無色界繫善尚且不善唯依不善者之修習緣又於唯作名為欲界繫唯作是最初唯依欲界繫唯作又此中凡與智所相應者依與自相等受之色界繫唯作無色繫唯作以上是此等聚之修習緣為色界繫唯作者是唯依色界繫唯作名為無色界繫唯作是唯依無色界繫唯作之修習緣然異熟為一法者或又如何雖為一法不為異熟之修習緣以上如是此處亦由緣生而判別應了知業緣廣說一四於業緣廣說業者是思業言依業果之諸色是依業之作故生諸色依業緣者是隔幾千萬劫得生自果依異剎那之業緣之義因為善不善業是於自轉之剎那不能與果故若與果者人作善業可上天界依其力於此剎那實可成天又由所作之剎那於別之剎那即雖全不知所作之故始於現法或者於後世與餘緣相應時生果如已滅之前工巧等之所作是如於隔時後工巧等之所作是故言依異剎那之業也謂思是為依諸相應法者如何思亦依與自相應諸法言依其相應法等起之諸色者是亦言依此結生剎那之業果色依業緣者是指此俱生之思而言因為善等之中如何俱生思亦依其餘之諸法名為心加行由作為性而助成者是故言為俱生業緣此是最初此處本文之注釋然此業緣由義正是四地之思彼等由性類之別而分善不善異熟唯作以上之四種此中善是由地依欲界繫等而分四種不善是唯一種異熟是四種唯作是唯三種以上如是此處由種種性類之別而判別應了知如是所分別之此中俱生之欲界繫善思是於五蘊有是與自相應之諸法及心等起之色於四蘊有唯依與自相應諸蘊之俱生業緣為緣又生而滅者依自之異熟與業果諸色之異剎那業緣為緣而且此唯實於五蘊有而無他處也俱生之色界繫善思一向依與自相應之諸法及諸心等起色之俱生業緣為緣又生而滅者依自異熟及諸業果色之異剎那業緣為緣又無色界繫及出世間俱生之善思於五蘊有依與自相應之諸法及心等起之諸色於四蘊有唯依與自相應諸蘊之俱生業緣為緣又生而滅之此等二種思亦唯依各自之諸異熟蘊之異剎那業緣為緣俱生之不善思於五蘊有依與自相應之諸蘊及諸心等起之色於四蘊有唯依諸非色蘊之俱生業緣為緣又生而滅思是依諸異熟蘊及諸業果色之異剎那業緣為緣於欲界色界異熟之思是依與自相應之諸法於轉時依諸心等起之色及於結生之時依諸業果色之俱生業緣為緣無色界繫異熟思是唯依與自相應諸法之俱生業緣為緣出世間異熟思於五蘊有依與自相應諸法及心等起之色於四蘊有唯依非色之俱生業緣為緣三地之唯作思於五蘊有依諸相應法及心等起色之俱生業緣為緣然此中凡於無色所生者唯依諸非色法之俱生業緣為緣以上如是此處亦由緣生而判別應了知異熟緣廣說一五於異熟緣廣說異熟之四蘊是由業等起者之色亦非異熟是故言異熟是言四蘊也如是本文唯有對諸非色法之異熟緣而說然於問分述異熟無記之一蘊是依三蘊與諸心等起色之異熟緣為緣結生剎那之異熟無記之一蘊是依三蘊與諸業果色之異熟緣為緣故亦可得諸心等起及業等起色之異熟緣然於此處留下餘地而說也以上此是最初此處本文之注釋然此異熟緣是依異熟若由性類而一種由地之別是依欲界繫等分為四種以上如是此處由種種性類之分別而判別應了知然如是雖所分別其欲界繫色界繫異熟是依與自相應之諸法於轉時諸心等起之色於結生之時諸業果色為異熟緣無色界繫異熟是唯依諸相應之法出世間異熟於五蘊有依諸相應法及心等起之色於四蘊有唯依諸相應之法為異熟緣以上如是此處亦由緣生而判別應了知食緣廣說一六於食緣廣說段食者是於四相續等起色之營養乃名為食然其作分段而吞者為食之作用於外部者有不作是故不言食而言為段食或者應作分段而食物故段者此唯名而已謂非有色食者是觸思識食言依諸心等起之色是於此處亦唯有業等起色之謂因為於問分有如是言故結生剎那異熟無記之三食是依相應之四蘊者與諸業果色之食緣為緣以上此是最初此處本文之注釋然此之食緣是可歸納為段食觸思識等以上四法此中除段食其餘之三非色食是依性類而由善不善異熟唯作之分為四種又依地之別善者四種不善者一種異熟者四種唯作者三種以上如是種種之分別然段食是依性類為無記由地唯欲界如是依種種性類之別而判別應了知然雖如是分別四地之三善食於五蘊有依與自相應之諸法及心等起色之食緣為緣除色界繫餘於無色唯依諸相應法之食緣為緣於諸不善食亦與此同理趣又四地之諸異熟食是遍依諸相應之食緣然欲界繫色界繫異熟是於五蘊有而生於轉時依心等起之色於結生時亦依業果色之食緣出世間異熟者唯依心等起之色於無色所生者是不依色為緣又三地之三唯作食於五蘊有依諸相應之法及心等起之色者然欲界繫色界繫於無色唯依諸相應法之食緣為緣四相續等起之段食即使言此依身雖不分別而說然若有分別者於食等起之色依能生者及隨護者之食緣為緣其餘之三相續等起之色唯依隨護者之食緣為緣如是此處亦由緣生而判別應了知根緣廣說一七於根緣廣說眼根者是名眼為根依根緣者自前生者於諸非色法自生起乃至破壞止依根緣為緣於耳根等亦同理趣言諸非有色根者於此處亦攝非色命根言依其等起之諸色者於此處由於前述同理趣亦攝諸業果色因為如是於問分有說故結生剎那之異熟無記之八根是依相應之四蘊與諸業果色之根緣為緣以上如斯是最初此處本文之注釋可理解然此根緣除女根男根正依二十根而建立因為女根男根雖為女相男相等之種子於歌羅邏等之時期不管彼等如何因非有女相男相故彼等為彼等或其他者決不成滿根緣性因為根緣是於自存在之剎那不分離諸法無所謂不成滿其根緣是故彼等雖非根緣但若對某者此等則為種子對彼等而彼等依經之說法而演本性親依止之性以上之根緣正依二十根而建立應了知彼等若依性類由善不善異熟唯作色而分別為五種此中善是由地者四種不善唯欲界繫異熟者四種名唯作者三種色唯欲界繫以上如是種種分別以上如是最初此處種種性類之別而判別應了知然雖如是分別四地之善根緣於五蘊有者依諸相應法及心等起色之根緣為緣不善者亦然又除了色界繫善其餘於諸善不善於無色唯依諸相應法之根緣為緣四地之異熟根緣亦一向唯依諸相應之根緣為緣然欲界繫色界繫異熟於五蘊有生故於轉時依心等起色於結生時亦依業果色之根緣為緣出世間異熟唯依心等起色於無色所生出世間異熟之諸根不依色為緣又三地之唯作根於五蘊有依諸相應法及心等起色然欲界繫色界繫之唯作於無色唯依諸相應法而成滿其根緣性於眼根等於六種色根眼根為是善不善異熟依俱與諸相應法二種眼識耳根等亦與彼全同種類耳識等色命根與自俱生諸色住之剎那之根緣為緣然此非有俱生緣性如是此處亦由緣生而判別應了知靜慮緣廣說一八於靜慮緣廣說諸靜慮支者是除二種五識於其餘之心名為尋伺喜快憂捨心一境性等七支然唯五識身所接觸故於彼等五識中之捨樂苦是無審慮相為靜慮支所不舉又於彼處有被簡略故餘之無因心中之靜慮支雖亦同不列舉但此處正於法之摘要中而舉之言依其等起之諸色者於此處應知是業果色所攝因於問分有如是言故結生剎那之異熟無記之四靜慮支是依相應之四蘊與諸業果色之靜慮緣為緣此最初此處本文之注釋然此靜慮緣雖由七靜慮支而建立但由性類而分為善不善異熟唯作等四種又依地而分為四種一種三種與十二種以上如是此處由種種性類之別而判別應了知然雖如是分別四地之善靜慮支又於五蘊有依諸相應法及心等起色除色界繫餘於無色界唯依諸相應法之靜慮緣為緣不善亦同理趣欲界繫色界繫異熟於轉之時依諸相應法及心等起色於結生時依諸相應法及業果色者無色界繫異熟唯依諸相應法者又凡於無色界生亦為出世間異熟然於五蘊有生之出世間異熟是依心等起色之靜慮緣為緣三地之唯作靜慮支亦於五蘊有依諸相應法及心等起色又此中凡於無色界生者唯依諸相應法之靜慮緣為緣以上如是此處亦由緣生而判別應了知道緣廣說一九於道緣廣說諸道支者除無因心生起餘於心生起之慧尋正語正業正命正精進正念正定邪見邪志邪精進邪定等十二支然道是依因之最後者於無因心諸道支不須提舉言依其等起之諸色亦於此處之業果色同所攝因為於問分有如是言故結生剎那之異熟無記之諸道支是依相應之四蘊與諸業果色之道緣為緣此是最初此處本文注釋然此道緣雖依十二道支而建立但若由性類之別由善等而為四種又善等由欲界繫等地之別而分為十二種如是此處由種種性類之分別而判別應了知然雖如是分別四地善道支又於五蘊有依諸相應法及心等起色除色界繫餘於無色界唯依諸相應法之道緣為緣以下全如於靜慮緣而應廣說如是此處亦由緣生而判別應了知相應緣廣說二於相應緣廣說全明本文之義然此名為相應緣若省略之則無色蘊然若分別之由此性類依善等又由地是依欲界等而有種種之分如是此處由種種性類之分別而判別應了知然雖如是分別四地於任何善蘊一蘊是依三蘊三蘊是依一蘊者二是依二蘊如是由任何之一皆依互相相應緣為緣於諸不善異熟唯作蘊等亦同此理趣如是此處亦由緣生而判別應了知不相應緣廣說二一於不相應緣廣說諸有色法是依諸非有色法者此最初為心所依及眼根等應理解因為於諸色法正此等六身分者是依諸非色蘊之不相應緣為緣然色處等之諸所緣法即使為不相應法亦非不相應緣依如何因緣耶相應之無疑故因為諸非有色蘊如由眼等所依之內部而出生故於其處有疑究竟此等與此等相應耶或不相應耶然諸所緣法是於依止為所依而生者不越於所緣於彼等無相應之疑如是無相應疑故彼等非不相應緣然唯於心所依等此始是不相應緣性應了知又於在問分亦如是言所依是依善之四蘊之不相應緣為緣所依是依不善之四蘊之不相應緣為緣眼處是依眼識之不相應緣為緣耳鼻舌身處是依身識之不相應緣為緣所依是依異熟無記唯作無記之四蘊之不相應緣為緣言諸非有色法是依諸有色法者此處仍由四蘊而可理解因為諸非色法之中四蘊正依俱生前生之諸色法之不相應緣為緣然涅槃雖非色法然而不依色之不相應緣所以言與四蘊相應或與四蘊不相應如是唯四非色蘊是不相應緣應了知又於問分如是言也俱生善之四蘊是依諸心等起色之不相應緣為緣後生善之四蘊是依前生此身之不相應緣為緣結生剎那之異熟無記之四蘊是依諸業果色之不相應緣為緣四蘊是依所依之不相應緣為緣如是最初此處本文之注釋應理解然此名為不相應緣若省略之於五蘊有轉者為諸色非色法彼等之中色是由所依與眼等而分六種非色是於五蘊有生由善不善異熟唯作而分四種彼等若由地由欲界繫等而分為四種一種三種三種等以上十一種因為無色界繫異熟非不相應緣故以上如是此處由種種性類之分別而判別應了知然雖如是分別於五蘊有生四地之善與不善又依令自等起之心等起色之俱生不相應緣為緣依越生之剎那而達住之剎那之前生之四等起三等起色身之後生不相應緣為緣此中言三等起身是非有食等起故是梵衆等之身應了知然欲界繫色界繫異熟於轉之時依心等起色又於結生之時依業果色之俱生不相應緣為緣出世間異熟唯依心等起色然雖此三種依前生之四等起三等起身之後生不相應緣為緣三地之唯作亦依心等起色之俱生不相應緣為緣依前生之四等起三等起身之後生不相應緣為緣又六種住色之中所依色是於結生剎那依欲界繫色界繫異熟之俱生不相應緣為緣於轉之時生四地之諸善不善二種五識三地之異熟及三地之唯作之前生不相應緣為緣眼處等是依眼識等之前生不相應緣為緣以上如是此處亦由緣生而判別應了知有緣廣說二二於有緣廣說依四蘊等由俱生而廣說有緣眼處等是由依前生言依止某色於此處是依俱生與前生而廣說有緣如是本文是唯由俱生前生之有緣而傳說然於問分則由俱生前生後生食根以上等之說故依後生食根而得有緣然此處以留餘地之說也以上此乃最初本文之注釋然此名為有緣是由分互相與自非互相二種此中互相是分非色是非色色是色色非色是色非色之三種言四非有色蘊者於此處實對一切之心生起非色乃非色互相為有緣而言言四大種者於此處就一切之相續等起色色對色也言於入胎剎那之名與色者於此處就諸結生及諸所依色非色對色非色互相為有緣而言非互相亦可分非色依色色依色色依非色等三種言諸心與心所法者於此處實就五蘊有非色對色而言也言四大種是依諸所造色者於此處就一切之相續色色對色言眼處是依於眼識界者就此等所依與所緣是色對非色而言尚且此名為有緣若省略之得名三剎那及色若轉之時亦可言為五蘊其由性類之別而依善不善異熟唯作色等為五種此中善是由俱生後生二種名為不善異熟唯作者亦然彼等之中善是欲界繫等之別而為四種不善唯欲界繫異熟是四地者名為唯作者為三地稱為色者有緣是唯欲界繫尚且彼等依俱生與前生二種此中五種所依與所緣者唯前生心所依是是俱生或前生也然於問分所說之食與根是俱生等之別則不得以上如是此中由種種性類之別而判別應了知然雖如是分別四地之善亦是俱生有緣於五蘊有一蘊是依三蘊等之理趣而互相依諸蘊及心等起色又除色界繫善餘於無色界俱生善者是唯依諸相應蘊之有緣為緣又此四地之後生善於五蘊有是依四等起三等起身之有緣於不善亦同此理趣所以其俱生不善亦於五蘊有依諸相應蘊及心等起色又於四蘊有唯依諸相應蘊之有緣為緣於五蘊有依四等起三等起身之後生不善有緣為緣又就異熟於欲界繫色界繫有緣在結生剎那依諸蘊及業果色之俱生有緣為緣又於轉之時依諸相應蘊及心等起色之俱生有緣為緣依達住之四等起三等起身之後生有緣為緣然於無色界繫異熟與無色生之出世間異熟者唯由與自相應諸蘊之俱生有緣為緣於五蘊有之出世間異熟是依與自相應之諸蘊及心等起色之俱生有緣為緣依四等起三等起身之後生有緣為緣就唯作於色界繫有緣是依諸相應蘊及心等起色之俱生有緣為緣依為四等起三等起身之後生有緣為緣又欲界繫色界繫是於無色唯依諸相應蘊於五蘊有亦依心等起色之俱生有緣為緣依四等起三等起身之後生有緣為緣又名為色之有緣是分俱生前生食根等以上四種此中俱生之色有緣是依等起而為四種存在此中業等起之俱生有緣為一大種是依三大種三是依於一二是依於二四大種是諸所造色以上如是依俱生有緣為緣於結生剎那所依色是依欲界繫色界繫諸異熟蘊之俱生有緣為緣彼等之中又三等起之色為一大種依三大種三是依於一二是依於二四大種是諸所造色如是依俱生有緣為緣尚且前生有緣是由所依前生所緣前生二種此二種亦最初所述前生緣同理趣之解釋而理解食有緣亦於最初依段食緣所解釋同理趣而解釋然現今之時是於自之非滅剎那由能緣性而為有緣而言色命根亦依於最初根緣色命根之解釋其所述同理趣是可理解然現今之時亦依自之非滅剎那之能緣性為緣而言以上如是此處亦由緣生而判別應了知無有緣廣說二三於無有緣廣說於等無間滅者依心生起而由無間法而等無間滅者依現在之諸心心所法者是依諸緣所生法也無有緣是與此餘地由義而成立無有緣性因為若由前者滅而為後轉不留餘地時彼等此後者之緣所生者則應無有以上是此處本文之注釋餘者全於無間緣所言同理趣應了知因為此中雖唯緣之說相不同但兩者之能緣與緣所生者無別然於彼處唯依眼識界及其相應之諸法是依意界等之理趣而諸能緣與諸緣所生雖依自體而說但現今之時於等無間滅之諸心心所法是依現在之諸心心所法彼等任何之一皆依滅生是一般之說也去緣廣說二四於去緣廣說去於等無間者是全等無間而去言去緣是依某性質而說此緣若去之無有緣與此唯於語言而分別於義則無別也不去緣廣說二五於不去緣廣說依四蘊者等之一切說相由於有緣廣說所說同理趣之意義應理解因為此緣亦俱與有緣唯於言語有別而於義則無別也今如是由略廣說而說於此等二十四緣為令智用更明白一由多法之一緣性二由一法之多緣性三由一緣之多緣性四由緣同分五由緣非同分六由雙七由能生非能生八由一切處非一切處九由色依色等之分別十由有之別依以上此等十句而雜判別應了知一此中言由多法之一緣性者其理以除此等業緣於其餘之二十三緣多法是同為緣然業緣是唯一思法以上如是最初此處由多法之一緣性而判別應了知二言一法之多緣性者是於最初因緣無癡是一法此等唯不正於前生業食靜慮緣而由餘之二十緣為緣無貪無瞋尚且不為根道緣而依餘之十八緣為緣貪癡者尚且不為異熟緣而依餘之十七緣為緣瞋尚且不為增上緣而依餘之十六緣為緣於所緣緣色處是依眼識界之所緣前生有不去等四種緣於意界及無因意識界亦然然為有因由所依增上所緣親依止為緣依此理趣應了知一切諸所緣緣法之多緣性增上緣之中諸所緣增上是於由所緣緣所述之理趣可了知多緣性於諸俱生增上觀是如無癡因為二十種之緣欲是不依因前生業食根靜慮道緣是由餘之十七緣為緣心是不依因前生業靜慮道緣是由餘之十九緣為緣勤是不依因前生業食靜慮緣是由餘之十九緣為緣於無間緣言眼識界等由論法而述之四蘊中受蘊者不為因前生業食道緣而依餘之十九緣為緣想蘊者亦不為根靜慮緣而依餘之十七緣為緣於行蘊因是於因緣所述之理趣欲勤者於增上緣所述同一理趣為緣觸者不為因前生業根靜慮道緣而依餘之十八緣為緣思者不為因前生根靜慮道緣而依餘之十九緣為緣也尋者不為因前生業食根緣而依餘之十九為緣伺者亦不為道緣而依餘之十八為緣喜同依彼等之十八為緣心一境心者不為因前生業食緣而依餘之二十為緣信者不為因前生業食靜慮道緣而依餘之十八為緣念是依彼等及道緣之十九為緣命根是於信所言之十八為緣慚愧是此除去根緣且依餘之十七為緣身輕安等之諸雙亦然於同種者有勝解作意處中性悲隨喜然離是由此等及道緣之十八種為緣邪見由此等除異熟緣而依十七種緣邪語邪業邪命依彼等及業食緣等十九種緣無慚無愧慢惛沈睡眠掉舉等以上是等者不為因前生業異熟食根靜慮道緣而依餘之十六緣為緣疑嫉慳惡作是由此等除增上緣而為十五種緣識蘊之多緣性是於增上緣所述同理趣應了知於等無間緣亦一同此理趣俱生緣之中最初於四蘊一一法之多緣性是依所已述同理趣而應了知四大種是依所緣所緣增上俱生互相依止親依止前生有不去等九種之緣心所依是依此等及不相應等之十種緣於互相緣無有新述者依止緣之中眼處等是依所緣所緣增上依止親依止前生根不相應有不去等之九種緣於親依止緣無有新述者前生緣之中色聲香味處是依所緣所緣增上親依止前生有不去等之六種緣唯於此處有新述者於後生緣等無有新述者食緣之中段食是依所緣所緣增上親依止食有不去緣等之六種緣於根等無有新述者如是此處亦由一法之多緣性而判別應了知三言由一緣之多緣性者是於因緣等於如何一緣依彼之某相或某義而對諸緣所生而為緣不捨其相或其義而依其餘之某諸相或某諸義於同剎那此等諸法之多緣為緣依其多緣性而判別應了知其義譬如無癡是因緣是因緣之義不捨而依增上俱上互相依止異熟根道相應不相應有不去因以外之十一相為多緣無貪無瞋由去彼增上根道緣之三為餘之多緣此唯於諸異熟因而得於諸善因唯作因仍然缺異熟緣性貪瞋癡去彼等三與異熟四而依餘為多緣所緣緣是其所緣緣義仍然不捨而依所緣增上依止親依止前生不相應有不去所緣之外七相為多緣此時若詳細分析則如是然於諸過去未來之諸非色法或諸色法於有所緣緣性之時得所緣緣以上者唯所緣增上與所緣親依止增上緣之中觀是等於無癡欲是仍然不捨增上緣之義而依俱生互相依止異熟相應不相應有不去由增上以外之八相亦為多緣勸是依彼等及根道以上由此等增上以外之十相為多緣心由此去道緣而入食緣依此等增上緣上之十相為多緣又所緣增上是於最初在所緣緣所述同理趣為多緣應了知無間等無間緣仍然不捨無間等無間之義而依親依止業修習無有去而由無間等無間以外之五相為多緣此時唯聖道思得業緣性餘之諸法不得俱生緣仍然不捨俱生緣之義而由因增上互相依止業異熟食根靜慮道相應不相應有不去依俱生以外之十四相為多緣尚且詳細分析者則如是然此時對所依俱生等是非因緣等亦應了知於互相緣亦同此理趣依止緣是仍然不捨依止緣之義於二十四緣之中去自依止緣之義及無間等無間後生修習無有及去緣之六餘由於依止以外之十七相為多緣尚且詳細分析者則如是然此時對所依依止等是無有因緣等應了知親依止緣之中所緣親依止是等於所緣增上無間親依止是仍然不捨無間親依止之義而依無間等無間業修習無有去而以親依止以外之六相為多緣此中唯聖道思可得業緣性餘之諸法不可得本性親依止是唯本性親依止而已前生緣是仍然不捨自前生緣之義而依所緣所緣增上依止親依止根不相應有不去前生以外之八相為多緣尚且詳細分析者則如是然此時於所緣前生不得依止根不相應緣性此外亦有可得或不可得應了知後生緣是仍然不捨自後生緣之義而依不相應有不去而以後生以外之三相為多緣修習緣是仍然不捨修習緣之義而依無間等無間親依止無有去而由修習以外之五相亦為多緣業緣是仍然不捨業緣之義最初一剎那業是依俱生互相依止異熟食相應不相應有不去而由業以外之九相為多緣異剎那業是依親依止無間等無間無有不去而由業以外之五相亦為多緣異熟緣是仍然不捨異熟緣之義而依因增上俱生互相依止業食根靜慮道相應不相應有去而由異熟以外之十四相亦為多緣食緣之中段食是仍然不捨食緣之義而依有不去而由食以外之二相為多緣餘之三是仍然不捨食緣之義如所應而依增上俱生互相依止業異熟根相應不相應有不去而由食以外之十一相亦為多緣根緣之中有色之五根是仍然不捨根義而依依止前生不相應有不去而由根以外之五相亦為多緣色命根仍然不捨根緣之義而依有不去而由根以外之二相亦為多緣無色之諸根亦如所應仍然不捨根緣之義而依因增上俱生互相依止異熟食靜慮道相應不相應有不去而由根以外之十三相亦為多緣靜慮緣是仍然不捨靜慮緣之義如所應而依俱生互相依止異熟根道相應不相應有不去而由靜慮以外之十相亦為多緣道緣是仍然不捨道緣之義如所應而依於靜慮緣所言之十相及因增上由以上此等道以外之十二相亦為多緣相應緣是仍然不捨相應緣之義如所應而依因增上俱生互相依止業異熟食根靜慮道有不去而由相應以外之十三相亦為多緣不相應緣是仍然不捨不相應之義無間等無間修習相應無有去名為六如所應而由不相應以外之十七相亦為多緣此中色與非色緣之別應了知有緣是仍然不捨有緣之義名為無間等無間修習無有去名為五緣如所應而依有以外之十八相亦為多緣無有緣去緣是等於無間緣不去緣是完全等於有緣以上如是於此處亦依一緣之多緣性而判別應了知四由緣同分者實於此等二十四緣無間等無間無間親依止修習無有去緣是同分所緣所緣增上所緣親依止亦然由以上之方法於此處由緣同分而判別應了知五由緣非同分者是此中前生緣與後生緣者皆是非同分相應緣與不相應緣亦然增上緣是與無有緣去緣不去緣以上是等之方法此處非同分應了知六由雙者此等之中又由義相似性聲相似性時相對性因果性互相相對性以上此等之相由雙而判別應了知實際無間與等無間者是依義相似性而名為一雙依止與親依止者是依聲相似性前生與後生者是依時相對性業緣與異熟緣者是依因果性相應與不相應者是依互相相對性而名為一雙有無有緣去不去緣以上如是於此處亦由雙而判別應了知七自能生非能生者又此等之中無間等無間無間親依止本性親依止修習緣異剎那業緣無有去緣以上此等之緣是唯能生而非非能生後生緣唯是全支持而非能生其餘為能生非能生支持等義如是此處由能生非能生而判別應了知八由一切處非一切處者又此等之中俱生依止有不去緣是名為一切處依一切有為之諸色非色法處因之義若無是等雖一法亦無生所緣所緣增上無間等無間無間親依止本性親依止前生修習相應無有去緣是名為非一切處雖非為一切諸色非色法之處但唯依諸非色蘊處因之義因為唯諸非色法依是等而生諸色法者不然前生與後生亦非一切處非色與色是如次第為緣故所述以外亦為一分之諸色非色法之生因故非一切處如是此處亦依一切處非一切處而判別應了知九由色是依色等之分別者又於此等二十四緣為一緣而無一向唯色為緣但一向唯色而有依非色名為緣然何以如此是前生緣因為前生緣是一向唯色依非色為緣一向唯色者非名依色非色為緣然一向非色名唯依非色為緣然何者如此依無間等無間修習相應無有去緣而有六種因為此任何者一向唯非色依非色為緣一向唯非色而名一向依色為緣然何者如此為後生緣因為此一向於非色唯依色為緣一向唯非色而依色非色為緣然何者如此依因業異熟靜慮道緣為五種因為此又全一向唯非色而依諸色法諸非色法為緣一向色非色而非名唯依色為緣然有唯依非色為緣然何者如此所緣緣及親依止緣因為此二緣一向於色及非色唯依非色為緣也然一向色非色名同依色與非色為緣然何者如此依增上俱生互相依止食根不相應有不去為九種因為此全一向於色非色而同依色非色為緣以上如是此處亦依色與非色之分別而判別應了知一由有之別者然於五蘊有此等二十四緣之中亦不得任何緣之名然於四蘊有除前生後生不相應三緣唯得餘之二十一緣於一蘊有依俱生互相依止業根有不去唯得七然於外根與非結合色依俱生互相依止有不去唯得五相以上如是此處亦由有之別而判別應了知第一善三法發趣之釋施設分之釋如是由順發趣等四中三法發趣等六而合為二十四全發趣於發趣大論凡依止於三法等而廣說故此言為三法發趣二法發趣乃至二法二法發趣於此等三法等不豫提述最初三法等由所分別唯由彼等諸緣名為論母設置緣分別分之分已說示略說及廣說今凡依止於三法等而有廣說故此言為三法發趣二法發趣乃至於二法二法發趣為此三法等廣說示此等之諸緣依止於一一之三法而說七大分相緣分俱生分緣依分依止分相雜分相應分問分以上等為是等其名此中緣善法而善法者由如是緣之語而名為相緣分於善法俱生而善法由如是俱生之語而名為俱生分此由前相緣分與義而非別種但由緣之語說由諸覺他者為第一由俱生之語由諸覺他者為第二又此二於如何之諸緣及諸緣所生法是色非色應了知又實此等唯俱生而不得前生後生者緣善法而善法者由如是緣之語而名為緣依分此亦如前二分之色非色法應了知然此時亦得前生之緣此是與前二分不同其次依止於善法而善法者由如是依止之語而名為依止分此由前緣依分與義而無別種但以由緣依止語說諸覺他者為第一以依止之語由諸覺他者為第二由此更言相雜於善法而善法者說由如是相雜之語而為相雜分相應於善法而善法者說由如是相應之語而為相應分此由前相雜分與義而無別種然以相雜之語而由說諸覺他者為第一以相應之語而由諸覺他者為第二又此等二者無論誰於諸緣及緣所生唯非色法應了知尚且於第七分依由善法之因緣為緣等之論法而起彼彼之問又諸善因是依諸相應蘊等之論法而解釋此等分別一切之問故此分是善分別諸問故始名為問分尚且此處諸緣緣所生亦皆正是為色非色法應了知此中先最初名為相緣分是由略說與自廣說而二種此中最初之略說分名為問分謂施設分亦同其名因為此緣於善等而生善等是善等因緣等而略說故為略說分緣於善等而善等之生是由因緣等而問故為問分緣於善等而善等生是由因緣等施設故亦言為施設分二六此中言若緣善法而善法從因緣生耶此是假定之問然此是此處之義若一切善法從因緣生者此是緣善法或又謂若緣善法而或善法生者彼從因緣耶此是此處之義此中者用於等之義因為相等之人是匹敵之人相等之分乃言相對分者是努力之語以兩者為一者是向前行換言之名俱生起而到達類似性質其意義是言俱於一處生起之狀態言善法者如是由俱生起之性質而問緣善法而善法從因緣生耶又者為緣然為其緣者雖得為前生緣或俱生緣但此處是俱生之趣意也於緣善法而不善法等亦與此同理趣此中俱生之故雖緣善法而無有不善法但於此問分一切由義答雖得或非得其一切是由問引出然後於回答凡非得者捨棄之凡唯有得者而回答如是了知此處之問意義及問之方法已今由數而知問之分量此中緣善法而善句為始以善不善無記之三問為終又同始其善而由善與無記等二種類為終之三問又同其善為始而善不善無記三法為終之一如是緣善法而以善為始之問者有七以不善為始者亦同以無記為始者亦同以善無記為始者以不善無記為始以善不善為始者以善不善無記為始者亦同以上任何皆於七問而有七種依止於善三法於因緣有四十九問此中以一法為根而結一法為九以一法為根而結二法為九以一法為根結三法為三以二法為根而結一法為九以二法為根而結二法為九以二法為根而結三法為三以三法為根而結一法為三以三法為根而結三法為一以上如是此等之問者是由根與結而應了知又如於因緣之四十九問於所緣緣等亦全同如是於二十四緣全體則復更一千及百七十六問於一根論法式而歸納三六由此更於從因緣與所緣緣之二根論法為始此中因與所緣之二根乃至因與不去之二根以上與因緣俱二十三之二根如於因緣此等之中於因與所緣之二根亦有四十九問於本文彼等之中唯示二又於因所緣二根如四十九於因增上二根等亦然此中最初問之方法以因增上因無間因等無間於順序而示三種之二根已最後以示因不去二根餘從略之此處問之分量如是應了知正一千及百二十七問於二根論法在二十三之二根中三八由此更從因緣所緣緣增上緣之三根論法為始此處增上緣等之二十三緣中之一一由與因所緣之二根結合而有二十二之三根此等之中依最初之問而示第一之三根與第二之三根已而示最後之三根餘者從略之又如於二根如是於諸三根亦於一一之三根而為四十九亦於全部二十二之三根問一千及七十八問若算者則在三根論法中三九由此更從因緣所緣緣增上緣無間緣之四根論法為始此處無間緣等二十一緣之中一一由與最初之三根結合而有二十一之四根此等之中示二個之四根餘者從略之此處亦於一一之四根而為四十九亦於全二十一之四根復更問一千二十九問若算者則在四根論法中由此更以五根始乃至一切根說一切從略以最先述者與更述者為一於本文一根二根三根四根五根一切根無有混亂應為廣說而開示論法此中於一根等所述者已述又於五根等無間緣等正二十緣之中一一由與最初之四根結合正有二十之五根於此等之一一若為四十九復更問九百八十問若算者則在五根論法中於六根俱生緣等十九緣之中一一由與最初之五根結合而有十九之六根此等之一一若為四十九由此更問九百三十一問若算者則在六根論法中於七根互相緣等十八緣之中一一由與最初之六根結合而有十八之七根於此等之一一若為四十九由此更問八百及八十二問若算者則在七根論法中於八根依止緣等十七緣之中一一由與最初之七根結合而有十七之八根於此等之一一若為四十九由此更問八百三十三問若算者則在八根論法中於九根於親依止緣始之十六緣之中一一由與最初之八根結合而有十六之九根於此等之一一若為四十九由此更問七百八十四問若算者則在九根論法中於十根前生緣等十五緣之中一一由與最初之九根結合而有十五之十根於此等之一一若為四十九由此更問七百三十五問若算者則在十根論法中於十一根以後生緣始十四緣之中一一由與最初之十根結合而有十四之十一根於此等之一一若為四十九由此更問六百八十六問若算者則在十一根論法中於十二根以修習緣始之十三緣之中一一由與最初之十一根結合而有十三之十二根於此等之一一若為四十九由此更問六百及三十七問若算者則在十二根論法中於十三根以業緣始之十二緣之中一一由與最初之十二根結合而有十二之十三根於此等之一一若為四十九由此更問五百八十八問若算者則在十三根論法中於十四根以異熟緣始之十一緣之中一一由與最初之十三根結合而有十一之十四根於此等之一一若為四十九由此更問五百三十九問若算者則在十四根論法中於十五根以食緣始之十緣之中一一由與最初之十三根結合而有十一之十四根於此等之一一若為四十九由此更問四百及九十問若算者則在十五根論法中於十六根以根緣始九緣之中一一由與最初之十五根結合而有九之十六根於此等之一一若為四十九由此更問四百及四十一問若算者則在十六根論法中於十七根以靜慮緣始八緣之中一一由與最初之十六根結合而有八之十七根於此等之一一若為四十九由此更問三百九十二問若算者則在十七根論法中於十八根以道緣始七緣之中一一由與最初之十七根結合而有七之十八根於此等之一一若為四十九正問三百及四十三問者若算者則在十八根論法中於十九根以相應緣始六緣之中一一由與最初之十八根結合而有六之十九根於此等之一一若為四十九又更正問之二百九十及四問若算者則在十九根論法中於二十根以不相應緣始五緣之中一一由與最初之十九根結合而有五之二十根於此等之一一若為四十九此等問二百四十及五問若算者則在二十根論法中於二十一根以有緣始四緣之中一一由與最初之二十根結合而有四之二十一根於此等之一一若為四十九正問一百及九十六問而歸納依智相者等而算於二十一根論法中於二十二根以無有緣始三緣之中一一由與最初之二十一根結合而有三之二十二根於此等之一一若為四十九又更正問一百四十而增七問若算者則在二十二根論法中於二十三根以去緣始二緣之中一一由與最初之二十二根結合而有二之二十三根於此等之一一若為四十九此若算者正知九十八問於第二十三之二十三根論法中尚且於二十四根是一切緣之總合應了知是故言此為一切根此處唯四十九問以上是等全唯提起因緣之句以一根始以一切根而終由大師為天衆廣分別此處所問雖略示之但尚且此等全有所共計因為於一根論法之中傳說為千一百七十六問於此等中之因緣論法唯因緣為根而作四十九於此因緣根應取之餘者應入於餘緣根中於二根一千百二十七於三根千七十八於四根千及二十九於五根九百加八十於六根九百三十一於七根八百八十二於八根八百三十三於九根七百八十四於十根七百三十五於十一根六百八十六於十二根六百三十七於十三根五百八十八於十四根五百三十九於十五根四百九十於十六根四百四十一於十七根三百九十二於十八根三百四十三於十九根二百九十四於二十根二百四十五於二十一根百九十六於二十二根百四十七於二十三根九十八於一切根四十九以上如是以因緣始而分別於一根等正又問一萬四千及七百問唯於一根等分別唯因之故四一如是以因緣始由一根乃至一切根示問之分別今示所緣緣始而若緣善法而善法生而從所緣緣從因緣等而言此中從所緣緣從因緣等如是以所緣緣始而以因緣終之示一根論法由此更從所緣緣與增上緣等之二根始此中最初二根及示所緣不去之二根餘者從略之從所緣緣與因緣等之最終二根亦未所示又若現於何處之誦道是同其誦道應理解之從此更由所緣緣而全不示三根等增上緣始以示一根等此言從增上緣無間緣等無間緣俱生緣互相緣等此為一根或者多根應了知由此更於不去緣始而唯示二根以從不去緣與因緣等始此中以不去因二根不去所緣緣二根不去增上緣二根等之順序而言三之二根正於最終以示不去去之二根四二由此唯由不去緣而示三根從不去緣因緣所緣緣等從不去緣因緣增上緣等從不去緣因緣無間緣等如是順次言三根已從不去緣因緣去緣等言最後之三根四三由此唯由不去緣而示四根從不去緣因緣所緣緣增上緣等從不去緣因緣所緣緣無間緣等說二之四根已言從去緣等之句取出而置餘之一切從略之四四為示其省略言一一句之一根二根三根四根五根一切根而無混亂而廣說是故以因緣始由因等之句於一根之千百及七十六問乃至於一切根如四十九如是於所緣緣等亦於一一始由所緣等之句於一一句之一根者千百及七十六問乃至於一切根者四十九如是分別一一之句於一根等之時有一萬四千加七百問於一切之二十四緣問之分量者如是三十五萬二千八百順中三善法之問是善分別又如善三法受三法等之問亦如是如是亦為一切二十二之三法於問有七百七十六萬一千六百於三法之種類而分別故又於二法發趣緣因法而因法生是從因緣等如是緣於因而因緣於因而非因緣於因而因非因緣於非因而非因緣於非因而因緣於非因而因非因緣於因非因而因緣於因非因而非因緣於因非因而非因於一一之二法對因緣等中之一一緣而有九問於此以因緣始於一根有二百十六問此等之中無雜其他唯對因緣之問即可得九問於此等二根等二十三分去除一一之九問乃至於一切根止有其次之分量首先於二根示一根於二百十六問中去除九而有二百七問因此除去九而於三根是百九十八如是除去前之九問而於四根是百八十九於五根是百八十於六根是百七十一於七根是百六十二於八根是百五十三於九根是百四十四於十根是百三十五於十一根是百二十六於十二根是百十七於十三根是百零八於十四根是九十九於十五根是九十於十六根是八十一於十七根是七十二於十八根是六十三於十九根是五十四於二十根是四十五於二十一根是三十六於二十二根是二十七於二十三根是十八於一切根是九尚且由是等因緣於一根二百十六問乃至於一切根九問如是於所緣緣等亦一一始而由所緣緣等句一一句於一根二百十六問乃至於一切根九問如是以一根等分別一一之句時而有二千七百問又於此等一切二十四緣之分量如次復是等六萬四千及八百之問於因二法之順論法中而分別又如因二法之問有因二法等之問亦如是如是於全百之二法由此更以六百四十八萬之問於百之二法中而知之此最初單純三法發趣與二法發趣所問之分量然由此更取二十二之三法而入百之二法中說名為二法三法發趣此中緣於因善法而因善法生是從因緣等如是以二十二之三法中一一之三法與百之二法結合而應說問之分量由最初所述之方法依全一根等算而應了知又由此更取百之二法而入二十二之三法中說名為三法二法發趣於其處緣善因法而善因法生是從因緣等如是百之二法之中一一之二法與二十二之三法結合而說問之分量是由最初所述之方法全由一根等之算而應了知又由此更以諸三法入於同諸三法中說名為三法三法發趣於其處緣與樂受相應之善法而與樂受相應之善法生是從因緣等如是以二十二之三法中一一之三法與餘二十一之三法結合而說可問之分量由最初所述之方法全由一根等算之應了知又由此更同於諸之二法入於同諸二法中說名為二法二法發趣此中緣因有因法而因有因法生是從因緣等如是以百之二法中一一之二法與餘九十九之二法結合而說問之分量由最初所述之方法全由一根等算之而應了知因為由如來全示此之分別為天衆而說法然而對法將軍舍利弗由如來今日如是如是所說唯略論法開示而敘述由長老舍利弗亦同略轉誦道此由長老所轉同依論法於結集時所編輯為示其略論法言三法妙發趣以設偈頌其義是三法之妙發趣者乃妙是最妙之三法發趣最上二法者是最上勝之二法發趣二法三法者是二法三法發趣三法二法者是三法二法發趣三法三法者是三法三法發趣二法二法者是二法二法發趣順中之六論法甚深者是此等三法發趣等甚深六種論法是順中應了知此處有法順與緣順之二順其中緣善法而善法者由如是阿毗曇論母句所攝由諸法之順說而轉者名為法順從因緣從所緣緣者是由如是二十四緣之順說而轉者名為緣順此中最初於注中言三法之妙發趣乃至順中之甚深六論法此偈是指法順而言然此處之偈是指法順中之緣順而言是故言順中之甚深六論法於注釋之偈是指法順中之三法發趣等之甚深六論法如是之意義應了知然於此個處從因緣從所緣緣者如是轉正於緣順中之法順是等三法發趣等言甚深六論法如是之意義應了知其等中之順三法發趣中唯由善三法於相緣分之此施設分略說問分別於餘之三法二法於餘之發趣亦不說一問尚且由此於後之俱生分等由善三法亦不引出所問唯由可能者以答說然若由順中之甚深六論法之語於此緣順此等六發趣論法是以所問引出而示此釋發趣是阿闍梨等之任務四五今有逆為說此緣善法而善法生是從非因緣等為始於其處由順之問給於同問之分量正因此於此處言如於順因緣所廣說如是於逆之非因緣亦應廣說四七再次於最終言如於順一一句之一根二根三根四根乃至二十三根之如是於逆亦應廣說又言二十三根是處唯指二根尚且最終一切根之二十四根亦雖同為有但一切唯從略言三法之妙發趣乃至逆中之甚深六論法者此處亦有二種逆是法逆與緣逆此中諸之善法如是由阿毗曇論母句所攝諸法緣非善法而非善法是由逆而說所轉名為法逆從非因緣從非所緣緣如是由二十四緣之逆說所轉者乃名為緣逆此中最初於注言三法之妙發趣與乃至逆中之甚深六論法之偈是指法逆而言然此處之偈正指法順中之緣逆而言是故言逆中之甚深六論法是於注偈是指法逆中之三法發趣等之甚深六論法如是之意義應了知然此時從非因緣從非所緣緣如是所轉於緣逆中之法順是等三法發趣等之甚深六論法如是之意義應了知此等之中唯順三法發趣之中唯由善三法相緣分於此施設分略說此問分別餘於三法二法於餘之發趣亦不說一問尚且由此於後之俱生分等對善三法而亦不引出所問唯由可能者而答說然若言由逆中之甚深六論法之語於此緣逆中此等六種之發趣論法應由所問引出而說此釋發趣實是阿闍梨等之責務四八今有順逆為說此緣善法而善法生是從因緣非所緣緣等始此中從因緣非所緣緣等乃至從因緣非不去緣等之因句緣餘二十三中之一一相結合於因始之一根而有二十三之順逆於此等之一一作四十九而有千百二十七之問又於二根是因所緣句由與餘二十二緣中之一一結合而有二十二之順逆以上如是於順中所言全於一根等各各句遞減餘由問數應了知又於此處一根等之問全於本文所傳說亦有非所傳說此等之一切正順最初所述理趣應了知五一又言三法之妙發趣乃至順逆中之甚深六論法於此處由與最先所述同理趣而有二種順逆是法順逆與緣順逆此中由善法與如是阿毗曇論母句所攝諸法是由緣善法而非善法之順逆說所轉而名為法順逆從因緣非所緣緣等如是於二十四緣中所得諸句由順逆說所轉而名為緣順逆此中於最初注中言三法之妙發趣乃至順逆中之甚深六論法之此偈是指法順逆而言然此處之偈正指法順中之緣順而言是故順逆中之甚深六論法是於注釋之偈是法順逆中之三法發趣等之甚深六論法如是之意義應了知然此時從因緣非所緣緣等如是所轉於緣順逆中之法順是等三法發趣等之甚深六論法如是之義應了知此等之中唯順三法發趣之中唯由善三法於相緣分之此施設分略說此問分別然於餘之三法二法於餘之發趣亦不說一問尚且由此於後之俱生分等由善三法亦引出所問唯由可能者而答說然若言順逆中之甚深六論法之語於此緣順逆中此等之六種發趣論法亦由所問而提出說明此是實釋發趣阿闍梨等之責務五二今有逆順為此說緣善法而善法生是從非因緣所緣緣等始於其處由順逆問而同之問量又於此處一根等所問凡本文所轉說或非所轉說此等之一切是正順最先所述之同理趣而應了知言三法之妙發趣乃至逆順中之甚深六論法此處亦由最先所述之同理趣而有二種之逆順是法逆順與緣逆順此中善法如是由阿毗曇論母句所攝諸法是緣非善法而善法由逆順說所轉名為法逆順從非因緣與所緣緣等如是於得二十四緣中之句由緣逆順說所轉者名為緣逆順此中於最初注中言三法之妙發趣乃至逆順中之甚深六論法此之偈是指法逆順而言然此處之偈正指法順中之緣逆順而言是故言逆順中之甚深六論法於注之偈是言法逆順中三法發趣等之甚深六論法如是之義應了知然此將從非因緣所緣緣等如是所轉於緣逆順中之法順是等言三法發趣甚深六論法如是之義應了知彼等之中唯由順三法發趣中之善三法於相緣分此施設分略示此問分別然於餘之三法二法亦於餘之發趣亦不說一問尚且於後之俱生分等由善三法亦不引出所問唯由可能者而答說然若由逆順中之甚深六論法之語於此緣逆順是等亦是六發趣論法雖由所問引出而說此實釋發趣之阿闍梨等之責務相緣分之義釋緣順五六今於施設分由依止於善三法而因緣等以四十九始唯由示論法而說是等無量之問此中無善不善等之俱生故一切言緣善法而不善法是從因緣生不答如是所問捨此等凡得答者唯答之此處之緣善法而善法是從因緣生等之論法亦對相緣分廣說分始也此中若由因緣等是等之四十九問皆不得答者然何故所說耶唯問得答應非可說耶然如是可說若如是說時於一切之三法二法發趣中一一之三法二法二法三法三法二法三法三法二法二法者不從略而必應說何故於善三法而得答者未必於受三法得又對於法順逆三法發趣中之尋三法與善三法是等一切之問皆得答是故詳分解而於一一之三法只是有得於善三法而應全說因為如是述時此中凡不豫答者捨之唯得者而說容易了別如是為易了別一切皆於善三法而說然此處不得答者捨之唯得者答之應了知此中緣善法者是緣四地之諸善法中受蘊等類之一法換言之相對而進或名為俱生起而到達相等之性質或到達與此等俱同轉狀態之義善法者是同四地之諸善法中想蘊等類之一法生者乃從生而至滅止出於上或出生之義也言得到自我亦得到生住滅之三剎那從因緣者是由善因而由成其因緣性如是對於生從因緣等之問生之答述今緣某法而某法所生其法應依蘊而示等於善之一蘊而言此中言善之一蘊者是受等四蘊中之任何一蘊三蘊者是以各各之一蘊為緣而承認者置各各之一蘊餘之三蘊三蘊者是受等之中承認某一蘊生者置彼而為餘之三也二蘊者是受想之二蘊等緣六組二蘊中之任何之二蘊二蘊者是以各各之二蘊為緣而承認者置各各之二蘊餘之二蘊是由善因而生成因緣性之義然一蘊者唯對於一蘊或者唯對於二蘊或者二蘊者唯對於一蘊而為緣者決不有故緣一蘊而一蘊緣一蘊而二蘊緣二蘊而一蘊者不可言也於緣善法而無記法是從因緣生等亦於已述之同理趣而應了知其意義心等起色者是緣義乃俱生之義故凡與善俱生者同時又為示得因緣而言以後亦如是於箇處亦與此同理趣也異熟無記唯作無記者是於此處無因非因緣故不可取又無色界繫異熟是與色不俱生故而不取於結生剎那是名業果色之無記是示緣無記蘊生起而說異熟無記者是由存在於剎那之無記蘊而述言緣四蘊而所依者是為說業果色之意義所依所取時亦緣四蘊而所依生而言緣所依而四蘊者是說緣所依四蘊之生起而言等於一大種者是為說緣色無記色無記生起而言尚且言等於一蘊亦由同一理趣此處意義之關係應了知如是於色無記緣四大種而四大種之生者如已前述今為述緣四大種而諸所造色生或言緣四大種而心等起之等若如是者唯可言所造之色者其他二者何故言耶為述緣四大種亦生因為於後示心等起之色與業果色彼等非確全緣於四蘊而生者尚且為述緣於四大種亦生如是所言應了知此中唯心等起之色唯轉時亦是業果色結生時也所造之色者正此兩者之別言緣四善蘊與四大種於此處唯取諸心等起之四大種又言心等起之色此中亦取大種色與所造之色因為由緣於一大種而三大種等之理趣亦緣大種色四蘊與諸大種而生起言緣四大種而所造色之理趣所造色亦生也言緣不善與無記者對於問與答亦同此理趣如是於因緣則唯有答九問實唯是等得於此處餘之四十者是空問而無答由此方法於所緣緣等對於問之答義亦應了知然於處處有伺察之價值者唯伺察我也五七於所緣緣首先色是由所緣緣而不生故此等九問中捨去雜色唯三問而有所答又與此等同理由言緣所依而四蘊緣四蘊而所依者不可說因為由此等所緣緣而不生五八於增上緣之異熟無記者是唯指出世間異熟而言是故於此處不言於結生剎那也餘者全等於因緣五九於無間等無間緣色亦不可得如是於所緣緣如唯三問六於俱生緣於結生剎那者於五蘊有由結生而說明然最初於緣分別分有於入胎之剎那此亦與此義為一唯語言之異尚且又若言三事和合故入胎之語者入胎者是五蘊有結生之名結生者雖共通於一切有於此處是業果色等之語唯有五蘊有結生之意義因為此等色之所緣性及緣所生性亦非色所攝是故謂完全回答外之一大種者是指與根不結合指地石等之大種而言因為於緣分別言四大種者雖言同內與外同一彼是略說而或是廣說故分別一切而說外者緣一大種等諸無想有情緣一大種者是由二相續等起大種而言也言緣四大種而業果色者仍然唯由業等起而述云所造色者是唯由時節等起而說六一於互相緣緣四蘊而所依緣所依而四蘊者是說與四蘊一同所依與互相緣而言六二於依止緣緣之義是俱生之義故最初於緣分別分說眼處等之依止緣性而於此處此等不可言因為眼處等雖前生為緣是於此處唯取俱生故是故此依止緣是等於俱生緣六三於親依止緣非色之親依止緣故唯得三答是故言等於所緣緣此處譬如一切善不善無記者雖不得所緣親依止然而凡由所得者而如是言應了知六四於前生緣以所依為前生緣者是緣所依由所依而完成前生緣性生之義言異熟無記之一蘊者於此處入胎剎那為異熟無記而不可取俱生緣為所依此處應分別前生緣故又凡於無色界之善等不可得前生緣此等亦同於前生緣所分別故此處不取尚且所緣緣者未必可得前生緣性因為色處等為眼識等唯成前生緣性為意識界雖亦有過去與未來之所緣緣是故此處不取色處等者理由是此說是由蘊而不依識界故又言異熟無記一蘊之說至於取一切之識界止但非唯眼識界等後生是為不緣諸善不善無記唯是支持者而非能生者是故從後生緣生如是無一法可言也如是由後生緣者不答也六五於修習緣一切唯作者雖未必得修習緣但為可能者言唯作無記也是故於此處唯言為證用唯作應了知六六於業緣於諸善不善之時是一剎那之業緣應了知唯作無記之時亦爾然異熟無記之時亦為異剎那業也於結生剎那之四大種亦然然為諸心等起之色是唯一剎那之業為諸業果色唯異剎那之業為諸無想有情色者亦然然此時業果色是命根餘一向非業等起故稱為所造色雖然如是此處正意味著業等起色六七於異熟緣不得善不善及唯作如是唯由無記而答心等起者唯異熟心等起業果色者應時機而為根色與所依色所造色者其餘者於彼時所存在之所造色六八於食緣一切善等之蘊及心等起色是由非色食而生應了知於結生剎那四大種亦然心等起者是由有分等之心而等起食等起者是段食等起心等起者唯善不善心等起於緣分別分由食之順序於最初說段食然此處為言善法者之問非最初色食說應了知六九於根緣最初於緣分別依根之順序最初雖說眼根但於此處由善等之問最初說非色根之緣性此中於善等如所應者應取諸非色根於諸無想有情之大種色命根亦應取七於靜慮道緣全等於因緣之答是故此處言等於因緣七一於相應緣之答是順所緣緣是故此處言等於所緣緣七二於不相應緣以所依為不相應緣者是緣所依而從不相應緣換言之以所依由成不相應緣性而生之義以四蘊為不相應緣者是緣四蘊而從不相應緣換言之緣四蘊由成不相應緣性而生之義四蘊是以所依為不相應緣者是四蘊緣所依而從不相應緣換言之緣所依由成不相應緣性而四蘊生之義心等起色是以四蘊為不相應緣者是緣四蘊而從不相應緣換言之心等起色是依緣四蘊完成不相應緣性而生之義尚且餘之諸答於以所依為不相應緣等亦依前述同一理趣其意義應了知又於異熟無記此處依取所依而應是眼等所攝緣一大種等者為說色無記之緣性而言心等起者是無記心等起和善惡心等起也七三於有緣全順俱生緣是故此處稱為等於俱生緣七四無有去是順於所緣緣七五不去者是順俱生緣是故此處言為等於俱生緣是等二十三緣者是為省略而說故如是言也應廣說者是由一切得回答之問而廣說也此是善三法之答中相緣分之緣順中以因緣為最初於一根之詮釋也七六今於此處因緣等中之一一緣雖得答分但以數彼等而示因九等始此中因九者是於因緣之問答分有九種如以下由善法而善由善法而無記由善法而善與無記由不善法而不善由不善法而無記由不善而不善與無記法由無記法而無記由善與無記法而無記緣不善與無記而無記以上所緣三者是由善法而善由不善而不善由無記而無記於增上九者是於所因全相等故於十二緣各各雖言九但於任何所問之答亦全相等於因緣故然於分別有別也於十緣各各言為三於任何所問之答亦全等於所緣然於分別有別也於互相緣對無記句之答亦可得色於前生緣亦然於修習緣雖是諸異熟為經路心者不可得言異熟一者是由無記法而無記而已如是若概括之則為九三一與答分之分量正有三種若廣說之則九答者十二三答者十一答者一如是於全二十三緣有百三十九分百三十九問百三十九答者其名皆同也七七如是示以因緣始於一根之數於其後之二根等略廣說而示於一根之說中唯取得之數以示答分之分量於二根最初言為從因緣及於所緣三等其處之說相乃如是多數分之緣若與少數分之緣結合正為與少數分同數是故所言從因緣及於所緣三因所緣緣之二根時於所緣而言是同得三答之義然同數分之緣若與同數分之緣結合全數則不減是故言從因緣與增上九於因增上之二根則同得九答之義於異熟一者於因異熟緣之二根則言於異熟同得一答如是最初於二根答分之分量應了知七八雖於三根等亦與此同說相是故方稱為從因緣與所緣緣及增上三於因所緣增上三根於所緣言者同得三答之義如是於一切時之論法者可推其理七九然於十二根異熟緣是不可得是故說從修習緣與業三已不觸及異熟而言食三等於十三根等亦與此同理趣八然以略其等而唯二十三根於此處說示此有二種是具修習或具異熟也此中最初說具修習此正得三答是故言從修習緣與不去三八一八二然具異熟是不得修習是故由捨異熟為示其數即其次之從因緣乃至從異熟緣與食一之說一論法已於後說二十三根然於此等二種之二十三根一無異熟緣一無修習緣然兩種之狀態雖無後生緣但由慣用語故是等言二十三根者正了知其等之中於具修習隨修習而同三答於具異熟隨異熟緣而唯一以上此以因緣始於一根等之數然此因緣之次言置所緣之時於何處亦唯三問若以所緣緣為始於一根二根等亦於遍所緣句及於所緣與餘緣之組合否則於有九問之時亦為說三問而言然於異熟句及異熟句與餘緣之組合則為一問以上最初多數分其緣若與少數分結合者則可言與其少數為等數完全可說八三八四今由所緣緣等而說一根等中一根是最初言與因一根全相等之意義關於一緣且不說然由所緣緣於示二根之數言從所緣與因三增上三乃至不去三而且此處雖言從所緣緣與增上三乃至不去三但與一切因緣等之多數分諸緣相結合時示得之數以所緣緣置於前而因緣置於後言從所緣緣與因三由此而明如下即所緣緣由各各之多數分或等數分緣之二根三根等類於何時亦應唯三問答然與異熟緣相結合時唯一得也此等以異熟緣始之答數可為明確之意義此處無所示之又凡於二根所示是等之數於三根等亦言與此同數之意義而由所緣緣三根等則不廣說今由增上緣等於示二根等之數言從增上緣與因九等於此處亦已述之同理趣而緣廣說應了知又如從增上緣與因九於如是之餘因與等數分之緣時亦同為九如是某緣始立此與等數分之諸緣結合時始立順於緣而有答數反之此與少數分緣結合時正順少數而有答數應了知又如由所緣緣即由增上緣亦由其他之無間緣等亦不廣說三根等是故於二根所示之數於一切時可成立是故方稱為以一一之緣為根而由諷誦可算也緣逆八七然逆於善句則不得善法乃無因緣不生故是故緣不善法等始此中從非因緣否定因緣無因緣而由他緣生之義因為言疑俱行掉舉俱行之癡此諸相應法及心等起色雖自為因緣但為自無他之相應因故從非因緣生者置於因緣之外然餘由自適當之緣而生由此理趣於一切否定之義應了知言無因異熟無記此由令等起之色亦應了知於其他如是之時亦與此同理趣八九於非增上緣實增上亦與自俱無第二之增上由不得增上緣然疑俱行掉舉俱行之癡如無因諸增上非為無增上又欲等之中不隨一增上而善等生起時一切善等亦無增上也是故如癡之分別唯不舉增上攝一切而以是等之善緣一蘊而三蘊等之說應了知九於非無間非等無間於非所緣唯如色是緣所生是故言等於非所緣緣俱生緣者缺也又如是依止有不去緣亦然何故耶無此等則任何者亦不生故若捨棄俱生依止有不去緣者實是一色非色法亦不生是故其等缺也九一於非互相緣分別於結生剎那緣異熟無記之四蘊而言業果色者是除心所依應了知也九二於非親依止分別唯色是緣所生因為此不得親依止緣然非色雖如不得所緣親依止本性親依止亦應脫離無間親依止是故言等於非所緣緣九三九四於非前生緣心等起色者是由五蘊有而說言從非後生緣於此處是俱生前生緣所攝是故於此處之本文是等於俱生緣然此於非增上緣被廣說故此處略之九五非修習緣是由善不善最初之證用應了知唯作無記亦然然此處之本文於通非增上緣所廣說應了知是故始言等於非後生緣亦非修習緣亦非增上緣九六於非業緣異熟思言於得異剎那業緣之意義乃不可謂九八於非食緣則唯一分色緣所生於非根緣亦然一於非靜慮緣五識法及一分色是緣所生因為於五識受與心一境性弱故言不滿足審慮相之義此等於靜慮緣則不取也一一於非道緣無因異熟唯作無記及一分色乃緣所生一二一三於非相應非無有非去緣唯色是緣所生是故言為等於非所緣緣一五一六言非因二者於一根之答數是通本文而出於二根言從非因緣與所緣一者是此處假使多數分緣與少數分緣結合時由少數分緣如非因緣者雖為二但由非所緣緣而諸非色法無故是指緣無記緣而色無記生言為一凡一答時任何者皆同此理趣然言二者之處於得非因緣通二分應了知又於三根等之一切無缺非所緣緣故唯一答以上此於緣逆以因緣始於一根等數也一九尚且非所緣緣等於最初一根與前相等故此處亦同不說示由於非所緣緣之二根從所緣與非因一與於非因二根同言之於非增上五者如於得非所緣緣應了知以上如是於一切之組合如少數答之緣其答數應了知然無論何處亦不入非所緣緣唯色是緣所生即入非無間非等無間非互相非親依止非食非根非相應非無有非去緣等箇處亦與此同理趣非食非根非靜處非道緣是於何處亦皆答也非俱生等之四於此處亦同缺以上此是此處之說相然由此說相而於一切之二根等此緣是根又此是此處之二根三根是一切根以考察此而順少數答某緣而答數應了知緣順逆一三三今於順逆示答數從因緣與非所緣五等始此中因增上道緣之順而置之時俱生依止有不去等四一切處緣與食根靜慮道緣之四與等以上是等八不得為逆因為由因緣等所生之法言不得是等八緣決非有故又所緣無間等無間親依止相應無有去緣為順而置之時非色處緣是逆而不得因為由所緣緣等而生者無不得無間等無間緣等復俱生互相依止業食根有不去緣順而置之時唯四一切處不得為逆者因為是等之緣力生決無不得一切處緣後生緣為順而不存在如是於餘亦於順存在之中不得考察而於一切之二根等論法亦於各緣之組合者亦順少數答而答數應了知緣逆順一九二今示於逆順之數從非因緣與所緣二等始此中因為逆置之時除增上餘為順而得然後生為順而不得一切處言九緣是唯為非色者此等之中除前生與修習餘之七緣為逆而置之時餘之非色處為順而不得因為由所緣緣等而不生者即不得無間緣等然結生異熟從前生又一切異熟者俱唯作意界雖由修習緣而不生但可得無間等是故言除前生與修習前生後生修習異熟不相應為逆而置之時除不去餘是由順而得業緣為逆而置之時除異熟緣餘為順而得食根為逆而置之時除一切處及互相業食根緣餘為順而不得於其他結合於緣順而得也靜慮緣為逆而置之時因增上修習道緣為順而不得道緣為逆而置之時因增上緣為順而不得不相應緣為逆置之時除前生緣餘為順而得如是此等之諸緣為逆而置之時知一切為順而得於各諸緣之組合順少數分之諸緣而答數應了知又於二根等之論法凡若以某緣始說示某諸二根等者各由如可得不可得之緣而說如是應善考察一九五此中由非因緣相當於說二根等之論法言從非因緣與非所緣緣乃至非修習緣言乃至修習緣止皆相等者從非互相緣與俱生一等相等應了知又言非業者可所計算時有五問與於錫蘭語所寫之其義以非因緣始而言從非業緣者如是與非業緣組合之俱生一者如是所說五緣由順而得其他為不得如是於其他如是個處雖不引文所謂之意義應理解因為如是之文為概括自己之思惟由古人等而以自語寫之尚且於逆順之緣所生法中亦有得業緣而不得根緣法此於無想及五蘊轉時之色命根應了知得道緣而不得因緣法此為疑掉舉俱行之癡應了知得靜慮緣而不得道緣法此是意界與無因意識界應了知此中業果色是由異剎那業唯得業緣此中諸色法是不得因增上異熟根靜慮道緣不逆於一切處緣於非因緣則無增上緣由是等之雜而此處之數分乃無混亂應了知此中此論式言從非因緣與所緣二者此處最先之無因癡及無因異熟唯作是緣所生是故指由不善而不善由無記而無記言此處之二餘亦與此同理趣然於修習不得異熟緣也唯作之意界亦然是故此處由無記而無記者是唯作無因意識界應了知異熟一者是依無記而無記道一者是由不善而不善一九八於非所緣根於因五者是唯指色而言因為此等是善不善無記善無記不善無記緣以上五類而生於一切之五亦與此同理趣言互相於一是指大種色與所依而言因為此等是從非所緣與互相緣而生於三根亦與此同理趣二於非增上根因九是同於順於因而言言三等亦言初順是全相等也於三根言二者初於從非因緣與所緣而言是全相等也二五於非前生根因七者是由初於無色緣善一蘊等之論法如於非前生說於一切之七亦與此同理趣二一四於非業根之因三等唯思乃緣所生是故言三是指緣善不善無記而生由此理趣傳說一二三五七九於答處之答數應了知然言四六八者為三答數是全無也俱生分之釋於俱生分俱生於善法者是緣善法而與其俱生之義餘於此處由相緣分而言是同理趣應了知復其終未言相緣之義即是俱生之義俱生之義即是相緣之義是等兩分亦由義者為說非異種而言若由義者是等二皆非異種故雖然為決定互相義而說因為於緣眼與諸色等言非俱生亦緣而生又雖俱生所造色是對大種色而非緣故如是依由緣分乃以俱生緣性依俱生分而言緣者決定俱生性亦說是等兩者尚且又由諸覺他者之意樂為說之修飾及為詞無礙解分別了知故說是等兩者也緣依分之釋二四六於緣分為緣善法者是安住於善法者或由依止善法之義而為緣義也言為緣善之一蘊者是善一蘊為依止三蘊者從因緣生以此方法於一切句之意義應了知言以所依為緣之異熟無記唯作無記之四蘊者是於五蘊有就轉而言因為於五蘊有轉前生之所依對四蘊為依止緣然於相緣分相緣之義是俱生之義故此之理趣有不得其意義於結生唯指俱生之所依言為緣所依而四蘊於善之一蘊與所依為緣而三蘊等亦與此同趣其意義應了知以無記法為緣而善與無記者是指善與無記是由因緣而時生起而言因為善生起之剎那依止於所依而四善蘊與依止於諸心等起之四大種而心等起之所造色是由因緣而同時生起如是之緣於無記之異時諸緣所生是指由因緣而時生起如是所言應了知於其他如是個處亦同此理趣如是於此種因緣俱生與前生由依止之義為緣十七問所應答此中四蘊及四大種由俱生而所依是由俱生前生而說然於相緣分由俱生為緣是故於其處唯九問所應答尚且此處所應答之此等十七問中於一始於一終之答善等之中從一緣而一緣所生於一始於二而終之答從一緣而多緣生於二始而一終之答從多緣而一緣所生於二始而二為終之答從多緣而多緣所生二五一於所緣緣等亦以此同方法其問答之種類應了知然於所緣緣言所依為緣而四蘊此唯指結生剎那異熟之四蘊而言眼識等依止於無記為示由所緣緣而生之類而言又以所依為緣者為示轉時諸異熟唯作無記之生而言餘如前之理趣應了知如此於此之所緣緣以俱生前生為緣而七問是所應答此中四蘊是由俱生所依是由俱生與前生眼處等是由前生為緣而言然於相緣分由俱生為緣故於彼處唯三問所應答二五六於增上緣異熟無記者唯出世間應了知無間等無間由非色之緣所生而等於所緣也又於修習無有去亦同此理趣二五八於俱生緣所造色之業果色者是言為所造色之業果色此唯指諸無想有情色而言眼處等是由五蘊有而說二五九又於互相緣言如是如所緣緣者是指相等於答而言然於緣所生則有不同二六一於親依止緣言等於所緣緣者是非色之緣所生故亦相等於答而說二六二以所依為前生緣等之意義是於相緣分所述同理趣應了知二六四於業緣云三者是以緣善而善以緣善而無記以緣善而善無記如是為三應了知於不善亦同此理趣二七於不相應緣以四蘊為不相應緣者是依止於四蘊以此為不相應緣而生之義四蘊以所依為不相應緣者諸蘊依止於所依以此為不相應緣而生之義餘於初所述同理趣應了知二七二今如得答以示此數言為因十七等此中於因十七者是由善而善由善而無記由善而善與無記如是由善於一始而一終者二於二為終者一以上之三者所言由不善亦然由無記而無記同由此而善不善善與無記不善與無記由善與無記而善無記善與無記由不善與無記而不善無記不善與無記以上如是十七應了知所緣七者是由善而善由不善而不善由無記而無記由無記而善由無記而不善由善無記而善由不善無記而不善以上如是為七於異熟一者唯由無記而無記而已如是此處答分之分量是十七答七答一答之三種此等之中十七答者十二七答者十一一答者一以上考察此等一切善而後之二緣三緣等於緣之組合答數是順少數應了知因為以此數於二根等答分之分量應了知二七三復以緣善法而善法者不提而由數而示答分之分量從因緣與所緣七等始於其處以緣善法而善法是從因緣與所緣緣生曰緣善之一蘊而三蘊者此論法得於所緣緣之答數而應廣說以上初於順理趣二八三然於逆不得善者如是以緣不善法者如是以初不善而答始此完全依本文而中止因為凡於此處可言者是於相緣分之逆所言者相同尚且於此逆者為由示得答分量之數而以非因四等為始此中有四十七七五三一等之六分量由此等而於二根三根等緣之組合答數應了知因為得十七答之緣於此等得數應答之緣組合為十七於得少數之答緣所組合餘得六分量如是其餘除增加分量正等與減少亦得又此處增加言不得有是此處之定則又正等與減少其意義有所相違時乃不可得是故此處言為從非因緣與非所緣等於一因為此處非因四非所緣五者是傳說故雖順非因而說四但與非所緣組合之結果與有所緣法者相違如斯以緣不善法而不善法以緣無記法而不善以緣不善與無記之法而不善法捨此三答者依以緣無記法而無記者言由色唯一而言如是於一切處知相違與不相違而得答之分量應了知二九二尚且又此處說此唯論法於非增上四者同於非因緣得於餘之四亦同此理趣於非無間一者是由無因心等起色及餘色而由無記而無記如是全於一答是所應之色應了知言於非前生二者此處亦順非因雖言為四但非與前生緣組合故言以緣無記法而不善以緣不善無記之法而不善者是所依由前生捨二答者然於無色由無因癡與無因唯作二答而言於非不相應二者於無色是由無因不善無因唯作而二也於非無有非去一者由一切色而見由無記而無記也於三根等乃無新之見二九四尚且於非所緣之二根於非增上五者是同於非所緣得於非業一者於處不取心等起色與業果色依餘之色而由無記而無記應了知於非增上根於非前生七者是同於非前生緣得言於非後生十七者是等亦於彼處同得十七非無間非等無間非互相非親依止非相應非無有非去根是全同於非所緣緣根以上唯由論法之說明於一切處雖有所傳說之有得與非得者應了知依止分之釋三八於依止分言依止於善法者是由安住之義而以善法為依止及作之義餘於此處依緣依分而言是同理趣應了知尚且其最後言緣依之義即依止之義依止之義即緣依之義此是此等兩分由意義而示無別種而言因為若由意義者此如相緣與俱生而無別種雖然如是但為決定互相之義而說因為於言以緣無明而行等不依止而轉異剎那者為緣而生於互相依附如立之棒等非一對一而依止緣如是所造之色是對大種決非為依止緣以上由緣依分以止緣性由依止分言為緣者為決定俱生前生性皆說此等兩者尚且依諸覺他者之意樂為所說莊嚴為詞無礙解分別了知故說此等兩者應了知相雜分之釋三九於相雜分相雜於善法而善法者是由以善法同一生等為相之相應為緣之義相雜於善一蘊者是以善一蘊為相應緣言三蘊由因緣而生之意義而說由如此之方法於一切句之意義應了知然於此之因緣唯由非色法相應之義為緣之答三問又如因緣於所緣緣等亦然唯於異熟緣一答而已三九八今如得答由答數而示於因三等而言此中全三答唯由善而善由不善而不善由無記而無記之決定然於一答唯得由無記而無記而已以上如是於此處於二十三緣者三答於異熟者一答分量者二也於後生無有順是故言三答一答者是由此等諸緣於二根三根等之緣所組合時異熟緣入者是一於餘三與如是答數應了知於此處之順餘之意義明矣順者終四九然於逆不得善也如是正以不善始為答此之意義正明矣復於逆示類此答之分量言於非因二等於其處則有二三一等三種之分量依此等於二根三根等緣之結合其答數應了知此處其多數與少數結合時唯少數者得與等數結合時等數亦得又於此處唯非色法為緣所生故由非因非增上非前生非後生非修習非業非異熟非靜慮非道非不相應唯逆示十緣餘之十四緣是不可得於此等得中異熟緣生之時非業與非異熟則不可得從非因緣與非增上二者是於非因得不外之二其餘之二亦同此理趣於非業一者是以無因唯作思為緣所生而由無記而無記由非異熟二是由無因癡唯作為二於非靜慮二者是由無因五識而無記之答應了知言於非道一者是由無因異熟唯作為無記答由此方法於一切組合之意義應了知逆者終四三二於順逆者唯由先所述之非因緣等十種而逆得餘者不得於所得中於因根之時為順而存在之靜慮道是逆而不得全與先所述同理趣應了知順逆者終四五七於逆順者於非因緣之緣所生中唯無因癡得靜慮道緣餘者不得於非靜慮緣亦為八無因心從非業非因非增上非前生緣於所緣一者是由無色界中之無因唯作思為由無記而無記由此方法隨所得及非所得之全狀態之答數應了知逆順者終相應分之釋四七五於相應分相應於善法者是以善法為相應緣之義餘於此處於相雜分所述同理趣應了知復最後言相雜之義即相應之義相應之義即相雜之義者是此等兩者皆由意義為示非異類而言雖然如是但為決定互相之意義而言因為言諸馬相雜而繫等之時不相應者亦言相雜於凡以觀懈怠俱行懈怠與相應者等不雜之相合亦說相應如是由相雜分以同一生起等為相之相應相雜性又由相應分為決定以同一生起等為相之相雜相應性故此等兩者皆說之尚且由諸覺他者之意樂為莊嚴教說為分別了知詞無礙解故如是亦說此等兩者應了知雜論尚且於此等六分某緣一向順而不存在唯為逆而存在一向為逆而不存在唯為順而存在或為順及逆而存在以上此乃雜論應了知此中最初之問是由後生第二是由四大第三是由所應之餘應了知問分之釋問分分別之釋四八四於問分由善法是依善法之因緣為緣等於善三法應提出諸問之中仍然得答說言善法是依善法之因緣為緣等然名為善是於自生之時除後生與異熟由餘之二十二緣而生以善為緣之時除前生後生異熟不相應由餘之二十緣為緣是故一切善是以善為緣為示其等諸緣之順序故以由因緣等為始此中如於緣分別分不為諸因是因相應之諸法者言諸因是諸相應蘊者作為如是之說法作如是者如下之目的理由是於彼處為明空義而言諸法者於此處由緣而生者是由法聚而生不由各各而成為明聚之義而言諸蘊者或於相緣分等說以蘊之緣所生故同隨彼於此處亦說之然何故於此等如是所說耶為無混雜分別而說也理由是於說緣一法而餘之諸法等之理趣時其確實依如是如是之法而如是如是之諸法者無混雜而不能知諸能緣與緣所生若如是則略說廣說乃可簡別是故為明無混雜而分別如是而說應了知言由為諸心等起之色者是或為由無記法之因緣為緣為示無記法者而言然於緣分別由善等而不分別總之為由一切諸因而示所生之色不言為由心等起之諸色而言由其等起之諸色是故於彼處諸無記因等起色亦入胎剎那之業果色所攝餘於如是之答亦由此方法而意義應了知四八七以施而施者是施捨應施之法完了或由彼以所施之思為施施者是令淨思清淨也受戒者是依五支十支等而持常戒因此唯示受離然得離斷離者於世間所言戒者不明故不述也即雖不言亦正為所緣緣此中斷離是唯為諸有學善之所緣緣為緣不依其他作布薩業者是願不殺生願不與不取如是於布薩日作八支布薩行省察此者以其善有學或異生亦皆省察之阿羅漢亦同省察由此阿羅漢前作之善亦是善然阿羅漢以所省察之心名為唯作心故言此之善法是由善法者於此條件不適以前之諸善行言與之受之作之為言近作此等非言近作應了知也為示布施等以外之諸欲界繫善而如是言也出靜慮者是由靜慮而出或本文乃依如此有學是進姓乃指預流而言其理由是能省察彼進姓言清淨者是指一來不還而言其理由是彼等其心名清淨諸有學者是指預流一來不還也從道而出者是超越道果有分自得由道而出然唯由道而出並無省察可言言以善從無常者是於此處之正觀不外是隨行三地之善應了知然觀善是唯欲界繫由他心智是示色界繫善由空無邊處等唯無色界繫善為所緣而生之無色界繫善由諸善蘊是神通類智等是於人不觸及唯依法而示正是之故於此處先言他心智亦再言之四八八味著者是以快俱行貪相應心而味而著歡喜者是以具喜渴愛而歡喜愈悅或以現前之歡喜而歡喜貪生者是味著者必貪生此義亦取貪俱行心而言見生者是歡喜者由我我所等與四心相應而見生復此時於未至究竟者疑生於散亂者掉舉於我不作善後悔之憂生緣此是以彼等前之諸善行為所緣之義此處則復數單數皆說或依性類此處依單數而已四八九阿羅漢是從道而出者是於道經路由越果無間之有分而出然阿羅漢之省察心是唯作無記如是示唯作無記之所緣緣完了再為示異熟無記而為諸有學或者等於善滅時者是觀證用經路之斷時異熟者是欲界繫異熟彼所緣性者是以彼所緣性彼以善證用之所緣緣為緣所觀之善作所緣而生之義然非唯以彼所緣亦為結生有分死沒理由是異熟以業為所緣而取結生心同以善為所緣然彼等難以了別而不示此處味著於善等者是為示於不善證用後之善所緣異熟而言識無邊處之異熟者此亦等於難了別但大異熟者無以彼所緣而生故得如實而言唯作者已得阿羅漢果於前未等至之空無邊處於逆或交代等至之唯作也更於他心智等應知於向轉對此等諸智之向轉諸之善蘊是所緣緣為緣而言此實為此處之意義四九於貪者是自或他貪然此處之釋普通是由自貪味著等已述之同意義然於疑等三者以無可所味著味著者不有所言然此處見生彼等言味著之句闕如以所出之次第最初則不言唯於疑等之中各各之自己於最初言而各各之次者言之然於是等貪等言何故是等之惡法生或由無忍而惡法作戀著作或由後悔等而憂生應了知四九三眼從無常者是由次等觀而明十粗處所依色等十一色故言也再度色處等是以眼識等之所緣故而述也然由此識身而說非由界者故不言意界也如是於全狀態謂與不謂者應了知省察果省察涅槃者是為示省察善之所緣而說也四九六於所緣增上之廣說由諸有學異生而說四地之善於俱增上廣說亦然阿羅漢是證最上法故於諸世間善無以尊重如是唯說最上道而己五五於無間緣前前之諸者是同一地之善異地之善亦皆一起而說隨順是進姓隨順是清淨者是由異所緣而由進姓道清淨為道者是依異地也五六然言善是出起者於此處言善是三地之善言出起者是三地之異熟其理由是此等由善證用經路而出起是故言為出起彼等有二種即彼所緣及有分也此中於欲界繫善亦有兩出起大者唯有分而已言道是果者此出世間異熟是證用經路所攝故不言為出起是故特別而言諸有學之隨順者是於無學善之無無間而作分別果等至者是為預流果一來果不還果等至者果等至者是為不還果等至於不善是二種之出起誰皆可得五九言諸異熟無記唯作無記者於此處諸異熟無記唯為諸異熟無記者諸唯作無記唯為諸唯作無記應了知有分是為向轉等是雜說此中唯作者是欲界繫唯作此二種出起皆以無間緣為緣大者唯有分而已如是於初之緣分別廣說言前前之諸善法是依後諸善法之無間緣為緣始善是依善善是依無記不善是依不善不善是依無記無記是依無記無記是依善無記是依不善等以上七分而說也依彼等於此處而省略而分別無間緣然若廣說者此處則依十種十七種或正六十種尚且復多種善廣說應觀察理由是此無間緣未必唯依七分而得廣說善是依善異熟不善是依不善異熟異熟是依異熟唯作唯作是依善不善異熟唯作等以上如是十種亦得廣說不唯十種而已善是依善善異熟不善異熟不善是依不善不善異熟善異熟善異熟是依善異熟不善異熟唯作不善異熟是依不善異熟善異熟唯作唯作是依唯作善不善善異熟不善異熟等以上如是十七種皆得廣說不唯十七種由正六十種亦得廣說如何因為欲界繫善由地之分別而為四種善之無間緣色界繫無色界繫是各各唯依自地等以上善是依善之六種無間緣然而欲界繫善是依欲界繫善異熟不善異熟色界繫異熟無色界繫異熟出世間異熟色界繫善是依色界繫異熟欲界繫善異熟無色界繫善是依欲界繫善異熟色界繫異熟無色界繫異熟出世間異熟出世間善是依出世間異熟者以上善是依異熟之十二種為無間緣不善是依不善者不善異熟三地之善異熟由以上五種為無間緣欲界繫善異熟是依欲界繫善異熟不善異熟色界繫異熟無色界繫異熟以上欲界繫善異熟是依異熟等六種為無間緣色界繫異熟是依三地之善異熟由三種為無間緣無色界繫異熟是依無色界繫異熟欲界繫善異熟是由以上二種為無間緣出世間異熟是依四地之善異熟是由以上四種為無間緣如是善異熟依異熟於十三種為無間緣不善異熟是依不善異熟欲界繫善異熟是由以上二種為無間緣如是任何時異熟亦依異熟由五種為無間緣然欲界繫善異熟是依欲界繫唯作不善異熟色界繫異熟無色界繫異熟亦然如是異熟是依唯作由四種為無間緣欲界繫唯作是依三地之唯作色界繫無色界繫唯作是唯依各自之唯作以上唯作是依唯作由五種為無間緣欲界繫唯作是依不善異熟三地之善異熟色界繫唯作是依欲界繫善異熟色界繫異熟無色界繫唯作是依四地之善異熟者之任何以上唯作是依異熟由十一種為無間緣復欲界繫唯作是依欲界繫善不善由以上善不善之二種為無間緣如是正由六十種而得廣說又非唯依六十種由多種亦同樣之得如何欲界繫初大善心於先自及四色界繫善為基本觀行十六之快出世間以上二十一善於證用之最終彼所緣與有分而生十一之欲界繫異熟其有分轉而色界繫無色界繫異熟為果等至轉十二之出世間異熟依以上如是之二十一善三十二之異熟是於以上五十三心為無間緣也第二之善心者亦然然第三與第四乃除上地之諸善與出世間異熟是依餘之二十一心也第五與第六是依自及九種上地之捨善及二十三種異熟是依以上三十三第七與第八者唯依二十一而已五種色界繫善依各自後之色界繫善復依四種智相應大異熟者五種色界繫異熟是以上十依依與此相同之理趣而無色界繫諸善中之最初是依自之異熟與俱十一種第二者依十二第三者依十三第四者依十四與果等至之十五出世間善是唯依各自之異熟而已於八貪俱行一一之不善是依十一欲界繫異熟意識界與九種大異熟及各自後等之二十一二種憂俱行是依捨俱行六種之欲界繫異熟意識界與自後之七種疑掉舉俱行之二者是依快俱行無因異熟與俱十一之欲界繫異熟意識界與九色界繫無色界繫異熟與自後等之二十一種善異熟五識是依善異熟意界意界是依二之異熟意識界此等二中之快俱行是依十之有分之異熟意識界與於彼所緣時自與後之建立唯作之十二種然捨俱行之無因意識界是依向轉意識與向轉意識界之二處由十種之異熟意識界等正由十二種三因大異熟是除快俱行推度由十種欲界繫異熟意識界色界繫無色界繫異熟及二向轉等二十一二因異熟是除大異熟由餘之十二五種之色界繫異熟是依十七種三地之善異熟有因結生心與二向轉等十九無色界繫異熟中之最初是依四欲界繫善異熟之三因結生心與四種無色界繫異熟心與意門向轉等九第二除下異熟依八第三除二下依七第四除三下依六四之出世間異熟是依十三之三因異熟與各自之後之十四不善異熟五識是依不善異熟意界意界是依不善異熟無因意識界此於依彼所緣時後之自於死沒時為結生及有分而轉者九欲界繫異熟之二捨俱行小唯作依十二唯作意界是依十識發微笑唯作是於五蘊有依有分而轉之九種三因異熟為彼所緣而轉之五快俱行異熟及自後以上不重說十三建立唯作是除唯作意界由十之欲界繫唯作者欲界繫之諸善不善於五蘊有為有分而轉之十五異熟心以上由四十五欲界繫三因快俱行二唯作者是依有分而轉十三之三因異熟為彼所緣之五快俱行異熟為淨治而轉之四色界繫唯作者阿羅漢為果等至而轉四快俱行阿羅漢果等至自後為以上不重說之二十五二因快俱行二唯作是如上所十三有分心五彼所緣者自後為以上不重說之十七二之欲界繫三因捨俱行唯作是為彼等同十三種有分為彼所緣而轉之六捨俱行異熟為淨治而轉之一色界繫唯作四之無色界繫唯作阿羅漢果等至自後為以上不重說者二十四二之二因捨俱行唯作此等同十三有分六之彼所緣及自後為以上不重說之十八色界繫唯作中之各各是依五蘊有九之三因有分及自後為以上十無色界繫唯作中之最初者於五蘊有之九有分於四蘊有之一及自後為以上十一第二於四蘊有得二有分第三是三第四是得四與果等至以上於此等之各自者如次依十一十二十三十五之無間緣如是由多種亦得廣說故言於由十種十七種又正六十種尚且復有多種善廣說應觀察等無間緣其意義即明瞭五四四於親依止緣親依止於信者於業業果此世間他世間等以信為親依止譬如人深信下方地中有水而掘地如是有信之善男子信布施等之果與利益而起布施等是故言為親依止於信於親依止於戒等亦以為親依止是等戒等諸法之義其理由是戒具足者於戒偉力與戒利益而熟知之故親依止於戒而戒具足者等布施亦受多重清淨無缺之戒於十四日等半月之日作布薩業依戒成就而令靜慮等生多聞亦一切成就是依布施等之福行及布施等之染污與清淨等之分別是由聞所成之慧而辦別而住者乃依多聞而轉布施等令勝解布施之施捨具足者亦依自之施捨成就而施若為戒具足者與大果而受戒作布薩業由此行而清淨心令靜慮等生慧具足者亦探求此世間他世間之利益與世間超出方便由此慧行得成就此世間利益他世間利益世間超出方便親依止於慧而起布施等然信等不僅唯為施等親依止而自後分生為信等親依止故言為信戒聞施捨慧是為信戒聞施捨慧者而言淨治者不解為直前之淨治應解前分之淨治如業生智者未來分智者是依是等二同是天眼淨治淨治非分別唯是天眼之附帶智是等如業生智未來分智者此為天眼之完成時完成若如是者對此與俱勝解性及天眼淨治是依此等之淨治應了知然是等全對非天眼而俱起故此處應為別淨治天眼是依天耳界者見遠方之色而欲聞此等之聲者天眼是對耳界淨為親依止復依聞此等之聲而欲行其處天耳界是對神通類智為親依止如是於全此狀態由其助成性為親依止緣性應了知親依止於道而以未生之等至是依各自之道而障礙令緩和由障礙之斷除而生起各各等至之意義彼等之道為等至之親依止緣觀者是更求上位之道而觀也為義無礙解者者是諸無礙解唯依道獲得而成就故言尚且復如是有所成就是等於後各各於諸所緣轉故道即名為親依止五四五親依止於信而語慢者我信有淨信而起慢執見者於各各之說唯以信為歸依不以慧觀察義理而由補特伽羅人我等而執邪見於戒聞施捨慧者我是戒具足者聞具足者施捨具足者慧具足者而語慢復如於戒聞施捨慧之慢矜者生見矜而執見於貪等依具足信等而自讚之時彼信等中之一一法是對於貪他毀之時而對瞋兩者相應對於癡對於前述類之慢見又依具足信等而得後有之受用對於欲願而為親依止如是於此處唯示世間善反之出世間善者是寂靜至善最上而摧破不善是故如對月之黑暗不為不善之親依止之意義不用言也五四六言令苦等是有關身苦說無記法而言其理由是信者依信而不辭極寒極熱作種種之工事與營事幫助等令苦責自己依此令生財富而作福者所求之本是苦受戒具足者亦為護持其戒而露地住者等令苦責自己由常乞食者等所求之本是苦受聞具足者亦適於多聞而修行依上述同理趣一面修行一面苦責自己所求之本是苦受施捨具足亦由勝解施捨自己生存之必需品亦不餘而施捨或又作肢體等之施捨令苦責自己為産生施捨之事物所求之本是苦受慧具足者亦我更增智慧而依智慧不以寒暑為事精勤諷誦思惟令苦責自己於邪命不正之生活是過患於正命正生活見利益捨邪命依淨命而欣求生計所求之本是苦受身樂者得信等親依止而生受用樂資具時由信等等起令妙善之色遍滿於身及依其信等而本無悔之勝喜喜悅令等起色遍滿於身身樂生時又其信等所作故生異熟樂時信等對於身樂而以親依止緣為緣以前述之理趣苦生之時及不能得信等之德而從事於殺縛等之時信等是對身之苦以親依止緣為緣復親依止於信等而生起果等至時對於果成就而言此信等中之一一是以親依止緣為緣應了知善業者是善思對自己之異熟為親依止緣然此以謂強力思而非微力之思此處如下之故事傳聞某婦人欲縊死當準備結繩於樹時一盜賊於夜間近於其宅以此繩捆綁何物欲取去以刀切斷之際時該繩變為蛇嘶嘶地而出聲響盜賊驚嚇而逃婦人從自家出來以繩索括首而縊死如是強力之思是排除障礙而對自己之異熟為親依止然此處一向不說明其理由是唯與機會之業即對於異熟排除障礙而為異熟復異熟能生業是對異熟而不為親依止乃不說明故業者於此處皆是四地之業應了知然後道是依果等至而言非由思也由此之事明矣即任何異熟能生之法即對自己之異熟而為親依止緣五四七親依止於貪而殺生者是於一切染著事物而有所障礙耶或求而殺生於不與取等亦同此方法而其意義應了知破家宅而侵入等是對不與取而說此中言侵入者是侵入家宅竊盜者則是隱藏而持去作一家掠襲者是大羣人一起圍繞一家而掠奪於路傍邀掠者是作路傍掠奪業追剝也於於瞋親依止等則由彼行不利益於我等而生之瞋為親依止於癡親依止者是於殺生等覆蔽過患以癡作為親依止於慢親依止者言我於何者亦不能殺不能取之慢作親依止或又對於任何人令卑賤輕視侮辱者此輕蔑作親依止之義於見親依止者如於施會等之婆羅門等或波斯人米拉卡人等以見為親依止於欲願親依止者是若我如是如是成就則我本身如是如是應供獻如是名為天請願者或曰願如是如是賜給我歟願取來如是如是人之所有物或言來為我作是等之業而成伙伴以如是等之欲願為親依止言貪瞋癡慢見欲願是依貪於此處貪對貪亦對瞋等為親依止順於瞋等亦與此同理趣五四八殺生是依殺生者住於殺生之非律儀故尚且亦殺害其他生物或又殺害此方由彼對方之親戚朋友而害此方者彼等親戚朋友中之其他者亦被殺害如是殺生是對殺生之親依止緣為緣復財貨之所有者若殺害看守者而奪取他人之財貨時殺害所有者而通姦其妻時作我沒殺之妄語時為隱蔽所作之事或揑造沒作事並列離間語時彼同此道理語粗惡語之時語雜穢語之時殺害他人已而又盼望貪得他人之財寶雜器思惟殺害殺害友人同僚之時如是因我殺生應隨其果為難作等而思惑時殺生是對於不與取等亦為親依止緣以此方法據不與取等之循環論其意義應了知五五殺母業是依殺母業者是見他人殺害其母而作如是思惟者以殺害己母者若或於生為殺害或後生亦殺害若唯於某生行殺害我母由於再三命令或以二打擊而令決定其死依加第二打擊殺母業是對殺母業為親依止其餘應亦然由此同理趣應了知然強力之不善是對於微力之不善非為親依止故業道之中唯對作無間業而說人人言未必亦如是之解因為作殺生等已而非難何故作如是耶時亦唯有憤慨亦為後悔者尚且亦令生無量煩惱及令其發展以作遠離是故強力對於微力者或微力對於強力者亦皆同為親依止然在緣分別略說之釋所言依強力因由之義為親依止者此唯就因由性之強力性而言非為諸親依止緣法之強力性因為業煩惱是強力與微力者皆相等於強力因緣故五五一於於貪親依止而布施等生有嗚呼我是生為四大天王之友哉若於受用親依止於貪而布施於受戒布薩業此亦同理趣然靜慮為伏貪觀為棄貪道為斷貪起親依止於貪而名者後求離貪性而起通與等至者起親依止於貪而名之如是始名為離貪者為信者對於由施等而起信於戒亦同此理趣因為如依施等而起信等依貪而起名如是貪等亦對於信等為親依止緣應了知為避之者為排除此而不令生起異熟身之義於可避免且亦然然於所有諸不可避之無間業云何言為避之耶此依志願言我者為避而轉者彼之志願故取之而如是說五五二親依止於貪而自苦者是所染著之事認此依難行而得為如是所作者全以前述同理趣應了知為身樂者是對於超越貪等而作善所得樂或由貪等而不見過患之人由享受諸欲而生樂為苦者是對於刻苦等而苦生或對於因以貪等而生起殺縛等所生之苦為果等至者是斷貪等而生者或對於貪等由於辛苦而成等至果等至五五三於身樂等樂生之時於味著之後再三依全同樣之緣而令生起之人前者對於後者為親依止反之於寒等之中納焚火等令過度之樂者前分之樂是對後分之苦為親依止言此出家尼柔軟臂毛之觸覺實是舒適者或者墮落於諸欲中者此世之身樂是對地獄之身苦為親依止然依無病性而安樂者於果等至而等至者身樂是對於果等至為親依止緣復為避苦而取樂令樂以為避苦如世尊鎮伏病而以果等至身苦是對身樂及果等至為親依止緣適應之時節對於樂及果等至不適應對於苦為親依止制伏不適應之時節而欲取由等至等起色享受所生之樂者於不適應之時節對於果等至亦同為親依止緣於飲食牀座等亦同此理趣再者身樂等乃全歸結說然以與初所述為同理趣彼等為緣應了知果等至是依身樂者對依等至等起之色所生之樂因為此人由彼等等至出且享受故五五四於親依止於身樂而布施等嗚呼我欲不失此樂者已得不令失或嗚呼我未來亦欲得如是之樂者到未得為得於苦亦嗚呼令苦減哉者為退減故或未來欲不生如是者願不生故樂苦為親依止應了知時節飲食牀座者已述之是同理趣再者謂身樂者之中善哉尊者目犍連彼歸命於佛於得樂者等亦遍知如是之苦而說法之佛陀實是正等覺者於得苦者等亦生信又為與樂相應不與苦相應當成滿戒等故樂苦者對於信等為親依止而說時節等亦然應理解五五五於親依止於身樂而殺生等亦與前述同理趣而樂等為親依止應了知然於此親依止分別善是對於善而由三種之親依止緣為緣對於不善是依二種對於無記是依三種之親依止緣為緣不善亦對不善則由三種對於善則依一種對於無記是依二種而為親依止緣對無記亦於無記是依三種對於善者亦然對於不善者亦爾以上如是之善是依八種不善依六種無記是依九種以上依二十三種而親依止所分別應了知五五六於前生依眼等粗色而述尚且水界等亦同為前生所緣所依前生眼處等是指一切所依為前生之處者而言所依是依異熟無記之四蘊者是指轉依時之前生緣而言五五九於後生緣依此身者是對四大種所成之身依後生緣為緣者是作支持故而為後生緣因為依照支持者之義為緣故始是後生緣於此問分之順者而順傳說五六二於修習緣隨順是依進性等別言箇處依前所述同理趣然所應了知五六五於業緣善思者是依諸相應蘊於此中俱生與異剎那之無區別故雖不說俱生者但對於無記答之分別故於其處而言謂結生思者是依業果色而言思為所依緣於結生剎那安住於所依之諸非色法雖緣所依而轉但示思亦對所依為緣而說五七二於異熟緣於結生分是同此理趣而意義應了知五七三於食緣依此身者是依四相續而轉於此四大種所造身對於食等起為能生者對餘之三是為支持者而以食緣為緣五八於根緣等結生分亦如上述同理趣應了知餘於何處其意義亦明了於問分所組合之順答數六二五今於此處如得答之示答數從因七等而言此中七者是由善而善無記善與無記之三由不善亦同為三由無記而唯無記以上如是為七所緣九者是以根一終一者九增上十者是善依善為俱生並為緣不善者唯為所緣依無記並為俱生與所緣依善無記者而為俱生以上以善為根四不善是依不善而為俱生與所緣依無記者唯俱生不善無記者亦然以上以不善為根者三無記依無記而為俱生與所緣依善者唯所緣依不善者亦相同以上以無記為根者三以上如是者十尚且於此處所緣增上亦有七俱生亦同七於無間七者以善為根者二以不善為根者二亦相同以無記為根者三以上如是者七於等無間亦唯是等俱生九者是以善為根者三以不善為根者三以無記為根者一以善無記為根者與以不善無記為根者亦相同以上如是者九於互相三者是由善而善者由不善而不善者由無記而無記者以上如是者三於依止十三者是不唯俱生以善為根者三以不善為根者亦同以無記為根者亦然尚且於此處亦得前生緣因為無記依無記於亦有俱生亦有前生依善唯前生緣依不善亦相同再者善無記是依善而為俱生前生依無記唯俱生而已不善無記者亦相同以上如是者十三於親依止九者是以根一終一者九於此等之分別說二十三之種類此等之中於所緣親依止者七於無間親依止者七於本性親依止者九於前生三者無記依無記者依善依不善以上如是者三於後生三者善依無記不善依無記無記依無記以上如是者三於修習三者是等於互相於業七者是等於因此中於二答傳說是異剎那業於五答則唯俱生於異熟一者是由無記而無記於食根靜慮道七者是等於因然此中根是由俱生前生而傳說於相應三者是等於互相於不相應五者是為俱生後生由善而無記由不善而無記俱生前生後生由無記而無記者為所依前生由無記而善不善者亦相同以善為根者一以不善為根者一以無記為根者三以上如是者五於有十三者為俱生由善而善為俱生後生由善而無記為俱生唯由善而善無記者以上以善為根者三以不善為根亦同再者為俱生前生後生食根由無記而無記者為所依所緣前生由無記而善不善亦同為俱生前生緣善與無記者依善同依無記者為俱生後生食根而不善與無記是由不善同依無記為俱生後生食根緣等以上如是者十三於無有去七者是等於無間等無間於不去七者是等於有以上如是於此處之一三五七九十十三等以上答數分量者實如七其等之中一答者唯異熟一三答者是互相前生後生修習相應之五五答者唯不相應之一七答者是因無間等無間業食根靜慮道無有去之十九答者是所緣俱生親依止之三十答者乃增上一十三答者是依止有不去之三以上如是於各各之緣所說分由答數而善考察此等而於二根三根等緣結合之答數應了知然某諸緣對於某諸緣而非同分若有相違者其等即不與其等相結合例如姑且對於因而為所緣無間等無間親依止前生後生業修習食靜慮無有去增上緣除觀餘之增上者即非同分俱生等乃其同分何故同依非有與有故其理由是因緣若對於某事物皆是因緣者對於其等而其俱生緣等亦為緣故然所緣緣等不為緣之意義對於其等則名為非同分是故因與其等或其等是不與因相結合前生與後生相應與不相應有與無有去與不去亦互相相違也其等亦不互相結合六二六此中去除不互相結合者去之由可相結合者得於結合示省略此等諸分從因緣與增上四等而言此時於因緣與增上緣之結合順少數雖有七分但四增上之中唯觀是因緣其他者不然故去非同分由同分言為四種此等如下應了知即善是依善法之因緣為緣由依增上緣為緣即善觀依諸相應蘊善法是依無記法之因緣為緣由依增上緣為緣即善觀是依心等起之諸色善法是依善與無記法之因緣為緣由依增上緣為緣即善觀是依相應之諸蘊及心等起之諸色無記法是依無記法之因緣為緣依增上緣為緣即異熟無記唯作無記之觀是依相應之諸蘊者及心等起之諸色而此處之異熟無記之觀是唯由出世間而得所緣緣無間緣等然為非同分故不相結合由此方法於一切處若知得與不得者則順於得之諸分乃可引出俱生七者是同於因所得互相三者是同於單獨之互相得依止七者是同於因得異熟一者是同於單獨異熟得於根道四者是同於先所述之理趣相應三者是同於單獨相應得不相應三者是由善等之心等起是以緣所生諸色應了知有不去七者是同於因得六二七如是之因緣是與增上緣等之十一緣得相結合故由此等而示於二根之答數已今三根為示答數而設定例型以於因俱生依止有不去七等而言然於書籍將依止親依止增上等如是之文字不完全諸緣之名而寫此等唯寫記號也是故如是之箇處完全為本文然此所設定之例型依此而明之此因緣者是與俱生等四相組合於自分別所得同得七答也若入於相應緣者同得此等之三若入不相應緣者則得於因與不相應之二根而得三若入異熟緣者於與一切異熟同分相結合而得唯一答若復入此中之根道緣者得此等之二根而同得四若以此等入互相緣攝者於因緣增上緣之二根所說示之四答中除善法是依無記法善法者是依善與無記法之二可得其餘之二若復入其中相應緣者同得此等之二若復入不相應緣者則得其餘之二若復彼等之中入異熟緣攝者則全此狀態唯一得再者增上緣與俱因因增上緣二根較少數若不入諸緣時同得四入少數之諸緣之時順此等而得二一如是於各各之諸緣相結合所得答數若了知者於三根等應引出答數然此等組合中最初之四組合者例如由此中無記而無記之答異熟因雖亦可得共同由九因全部唯非異熟而言由此後之組合由異熟因而言於其處為全俱生之異熟及與異熟俱生之色其等之中於最初之組合可得異熟及等起之諸色於第二得異熟及於結生所依色於第三唯諸非色法於第四唯異熟心等起之色於第五唯得所依色此後之十五組合是與根相結合者是對無癡因而言其中初之九是無增上後之六是有增上於無增上初之四是全部對一切時之無癡而言後之五是對異熟無癡也此中於無增上中初之四者同於最初示因增上兩根於第二缺心等起色於第三缺所依色於第四是善法依諸心等起無記是依諸其等起唯得如是色此後與異熟結合之五者與初所述同理趣有增上之最初三組合者一切依異熟非異熟因而言此等之中於最初之組合之四已述者同理趣於第二缺色於第三缺非色由此而後之三是對異熟因而言此等之中於最初可得色與非色於第二唯非色而已於第三唯色而已如是又知於各各緣結合所得之答數者於三根等之答數者是應引出因根終六二八於所緣根增上緣等之七是與所緣同分餘之十六是非同分如是此等不組合唯七者所結合此等之中增上七者是善法依善法依不善法依無記如是以善為根者三以不善為根者一以無記為根者三以上如是者七依止三者是由所依故唯以無記為根者而已親依止七者是同於最初前生三者是由所依與所緣故以無記為根不相應三者是唯由所依故有不去三者是由所依與所緣故六二九復於因根為示其類型如以設置組合於所緣根等亦然此中最初於此所緣根設置五之組合此中最初者由所緣增上而有增上者其處言七者於得所緣增上之同答第二是無增上其處言三者是由所依與所緣之故或由所緣故以無記為根第三是與依止相組合其處言三者是由所依故以無記為根者第四第五是有增上於此等中第四言一者是由所依與所緣故或由所緣故以無記為根而不善於第五言一者是由依止故以無記為根而不善如是於此處所得者順於三根等之答數應了知於增上根等亦然就所緣根異熟緣不詳說結合吾等說於各各之個處唯有價值者而說六三於增上根言俱生七者是由俱生增上故以善為根者三以不善為根者三以無記為根者一然俱生與俱所緣增上又所緣增上與俱俱生者皆不可得言互相三者唯由俱生增上言依止八者是以善為根者三以不善為根者三以無記為根者二因為無記之增上是對於無記為俱生所緣而依止對於不善為所緣然對於善兩者皆無如是唯以無記為根者二之意義如是者八親依止七者是全相等於所緣緣言前生一者是無記增上對不善而為所緣言異熟一者是由無記而無記即是出世間食等七者是同於得最初一根不相應四者是由善而無記由不善亦同由無記而無記與善有不去八者是全等於依止六三一然於此處之諸組合隨順序而不令所緣等相結合最初令與有不去結合依云何之理由耶是兩增上混入故此中於最初之組合為所緣增上而可得所依與所緣於第二是依止故唯尊重味著者之所依於第三俱生增上之諸善乃對於諸色所緣增上之所依乃對於不善其後之三組合者是對所緣增上而言其中於最初謂七者是同於最初所述於第二言一者是前生之諸所依所緣對於不善於第三唯所依對於不善其後之三組合異熟非異熟一般是作俱生增上而言此中於最初得色非色於第二則唯非色於第三唯色而已其後之三是就異熟增上而言於彼等之中於最初則得色非色於第二則唯非色於第三則唯色而已其後之食根所結合之六組合者是對心增上而言此中三是無異熟三是有異熟於其等之答數完全明了其後六組合完全同對勤增上而言從增上之順序最初對勤增上而言耶何故如是不述耶即對後之因說諸組合相等故因為後之諸組合是由於因故無癡之觀增上性故觀正見性故道相組合又勤由正精勤邪精勤性而為道與道相組合故由後因說諸組合相等之意義且轉倒而說於此等之答數亦完全明了六三二於無間等無間根言七者是善依善與無記不善亦如上所述無記是依三之任何以上如是者為三業一者是善之道思對自之異熟無記然於是等組合者唯三此等從多分之順序而說六三六於俱生互相依止等之根唯於二根所說之各各諸緣乃與最初所置為同分故於二根之答數若為可知此等以上諸緣之組合於此等全組合之答數即依少方之答數應了知六三七此中以俱生為根者是十組合此等之中五是無異熟五是有異熟此中首先於無異熟中之最初善是依善無記善與無記善與無記是依無記者以上等四不善亦同無記唯依無記以上如是者九此中於善不善等之八答數非色及心等起之色可得於無記亦為所依色於第二組合之無記答則可得唯諸色中之所依色於第三三答數之善不善無記者亦唯非色而已於第四則唯心等起之色於第五於結生之所依俱為諸非色法於有異熟中之最初是異熟及異熟心等色於第二是異熟與所依色於第三唯異熟而已於第五則可得唯所依色六三九於互相根有六組合此等之中最初之三無異熟後之三是有異熟於此等之答數完全明了六四於依止根從依止緣與所緣三者是以所依為所緣而轉善等應了知親依止一者是以所依為所緣親依止而生之善餘於二根最初述同理趣應了知六四一然於此依止緣有二十種之組合此等之中前六之組合是對前生俱生而說其後之四是對前生最後之十唯就俱生此中於最初之組合言十三者是同於依止緣分別而說於第二言八者由俱生增上七及尊重所依不善以上之八於第三言七者同於根緣得於第四言五者同於不相應緣得於第五言四者是善等對於心等起以及所依對於不善於第六言三者是善等對於心等起由前生故四組中於最初言三者是所依對於善等眼等者對於無記於第二唯所依對於善等於第三言一者是所依對於不善於第四則眼識等對於五識由於俱生之故有十組是由有異熟無異熟而分二種同於俱生根而述者應理解也六四二於親依止根謂所緣七者是同於所緣親依止而得者增上七者是同於此等於無間等無間緣是同於無間親依止而得者依止一者是所依對於不善於前生一者是所依與所緣對於不善修習三者是由無間親依止業二者是由本性親依止但出世間善思是無間親依止不相應一者是由所緣親依止於有不去亦然於無有去七者是全相等於無間六四三又以親依止為根之七組合此中前之三是由所緣親依止而說此中於最初言七者是善對於善等無記亦同不善唯對於不善以上如是者七於第二言一者是眼等之無記對於不善於第三是所依對於不善自此而後之二組是對無間親依止而說此等之答數者完全明了其次之二組是對無間本性親依止而述此中於最初是取世間善不善思為緣於第二則唯出世間善而已六四四於前生根所緣三者是無記對於善等增上一者是無記對於不善於餘是同此理趣六四五又此處有七組合此等之中於最初是對所依與所緣而說於第二唯對所依於第三是對所緣於第四是所依對於所緣之時第五是對所緣增上第六是諸所依對所緣增上之時而言第七是對於眼等而說六四六於後生根二十緣是不相應唯三得相應此處唯有一組合此對於身善等而應了知六四七於修習根亦唯有一組合六四八於業根無間一者是對道思而說言互相三者是於此處是取結生之所依親依止二者是對無間與本性親依止而同於前述者如是餘亦如前述應理解六四九復於此處有十一組合此中最初之二組是分別本性親依止與無間親依止而對異剎那業而述其後之四是對異熟非異熟之一剎那業而說此中於最初得非色與俱心等起之色於第二非色與俱所依於第三唯非色而已於第四唯心等起之色而已然於結生得業果色其次之五是有異熟此等與前所言者同理趣六五一於異熟根之五組合其意義完全明矣六五二於食根七等已述者而同理趣然於此處組合有三十四此等之中最初之五由異熟非異熟一般而言此中於最初亦得四食於第二唯三食於第三所依亦緣所生於第四則闕如於第五唯色是緣所生此後之五有異熟之組合是與前述同理趣此後之九組合是對思食而言此後之九是對無增上識食此後之六組合是對有增上識食而言此中三者是對異熟非異熟之共通而言三者是唯對異熟而已此中非世間異熟故缺所依也六五四於根根言前生一者是由於眼根等故由無記而無記餘之二根是如前所述應理解六五五於此處之組合有七十六此中於最初一切根任何之一皆由緣義而得於第二缺色命根因為此非依止故於第三是諸非色根對於諸色組於第四是眼等對於眼識等此後之九組合是對俱生之非色根而說其次之九是對道之諸根由此之九是對靜慮分者此後之九是對靜慮與道此後之九是唯對意根從此有增上者六從此由於勤觀增上故道之結合有六種由於無癡因而無增上有九有增上有六於此等一切異熟緣之不相應與相應者以先所述同理趣而應理解六五六於靜慮根二根亦以前所說同理趣而應理解復於此處有三十六組合此等之中最初之九是不觸及於根道之性而對一般靜慮分而說此後之九是對根之靜慮分此後之九是對道之靜慮分此後之九是對以根而為道之靜慮分復於此等四之九組各各最初之四組是異熟非異熟之共通而餘唯各各五異熟而已此等已述者同理趣六五八於道根二根亦以已述同理趣而應理解然於此處有五十七之組合此等之中最初之九是不觸及根靜慮性單為道分而說此後之九是對根之道此後之九是對靜慮之道此後之九是對以根對靜慮之道此後之六是對增上之道此後之九是對無增上道因此後之六是對有增上道因此中於九是各各五於六是各各三是異熟餘是共通此等與已述者同理趣六六於相應根二根者其意義明矣然於此處唯有二之組合此中一是對共通一是對異熟而說六六二於不相應根二根其意義全明也然於此處有十三之組合此中言最初五者是善依無記不善者亦同樣然無記亦皆依三又此時之此等不相應等是有俱生亦有後生前生於第二唯有前生與俱生於第三此等四始對於增上於其處善是依無記不善者亦同又無記依無記及所緣增上者依不善者以上如是之四於第四言三者是善等依無記者然此處之諸根亦為色非色於第五諸緣唯非色於第六所依唯色於第七唯所依其等由觀故依善無記者依味著故依不善於第八其同者依不善於第九眼等依無記於第十善等依心等起之諸色於第十一於結生所依依諸蘊於第十二諸蘊依諸業果色於第十三於結生之諸蘊依所依六六四於有緣根親依止一者是為所緣親依止之無記依為無記於二根其餘明了也六六五然於此處組合有三十一此等之中於最初由非色所依所緣大種根食而得俱生前生後生緣於第二則得後生段食色命根第一第二之組合與增上俱更於作第三第四又同於第一與四食俱第五諸色根與俱第六色非色與俱諸根作第七復同於第二與俱諸根作第七同第一與第二與不相應俱第八與第九此等之中第九增上與俱作等十此後於第十一以為緣除所依於第十二唯諸非色法是緣於第十三是所依所緣也於第十四唯所依於第十五唯所緣於第十六唯所依是所緣於第十七然相同此由所緣增上性於第十八亦同此依所緣親依止又於第十九唯眼等為緣今稱為第十九之雜組者不取俱生而說再者此後之十依俱生而說六六七於無有去根如於無間等無間依親依止修習業而唯三組六七一不去根全相等有根然凡於此等之問分所說之組合此等全由雜與俱生等之二種此中全所緣根等之初不取俱生而說為雜此等於所緣根五於增上根六於無間根三於等無間亦同於依止十於親依止七於前生七於後生唯一於修習亦同於業根二於食根一於根根四於不相應根九於有根十九於無有根三於去根亦同於不去根十九以上全有百與三也然是等定非有俱生故稱為雜然凡得俱生之其等即名俱生組而言此等於所緣根不於無間等無間親依止前生後生修習無有去根因為此等之諸緣是不依俱生為緣故如不依俱生為緣則因俱生互相異熟靜慮相應緣是對無俱生不為緣也如是於因根全十四任何之組合亦唯有俱生組合同於增上根二十四於俱生根十於互相根六於依止根十於業根九於異熟根五於食根三十三於根根七十二於靜慮根三十六於道根五十七於相應根二於不相應根四於有根十於不去根十以上三百與十二者皆為有俱生組以上前之百三與此等後者之三百十二全四百十五組合於問分所傳說此等之中凡由名為諸緣法而明且不知者任誰皆初因根等之理趣為異熟非異熟共同通而說以示諸組合其理由是十二因六所緣四增上四食二十根七靜慮分十二道分以上是名為緣法故此等之中一向於善之諸法一向唯不善一向唯善異熟一向唯不善異熟一向唯異熟一向唯非異熟以考察各各之善凡此中為異熟者而於異熟組合凡為非異熟者乃於無異熟組合如所應而結合緣摘出分之義釋今有逆於其處於初相緣分等緣不善法而不善法是從非因緣生等之論法如所得問是依所得緣而具體地廣說如是不廣說者是依一類型略而說逆以攝法善法者由善法之所緣緣為緣等之論法對於順善等諸緣以摘露然此等之緣者是為諸緣集成而說決非為一一之緣而說是故凡於其處作為集成而說其等之緣者分別而應理解因為此等二十四緣全攝於八緣中故如何於八緣中耶於所緣中俱生中親依止中前生中後生中業中食中根中等以上何故耶其理由除此等之八緣餘之十六緣中因緣互相異熟靜慮道相應緣以上此等六緣是一向為俱生對於諸俱生者唯由緣而攝俱生緣復無間緣等無間修習無有去緣以上此等五生而滅者乃對於生自無間次者唯由緣依無間親依止之相而攝親依止依止緣是由俱生與前生之別而有二種此中俱生依止是對於諸俱生者唯由依止緣而攝俱生緣前生依止是攝前生緣增上緣亦由俱生增上所緣增上而有二種此中俱生增上是對諸俱生者唯由增上緣而攝俱生緣所緣增上不外是所緣親依止從所緣親依止之相而攝親依止緣不相應緣是由俱生前生後生之別而有三種此中俱生不相應是對於諸俱生者唯由不相應緣而攝俱生緣前生不相應是對於前生後生者由緣而攝前生後生不相應是對後生前生者由所支持之緣而攝後生緣有緣不去緣是依俱生前生後生食根及有不去中之各一為六種而設此中俱生之有不去是對於俱生者唯由有不去緣而攝俱生緣前生是對於前生後生者由緣而攝前生緣後生是對於後生前生者自支持之緣而攝後生緣食者是攝於段食緣根者是攝於色命根緣以上如是之此等十六緣是攝於此等八緣中應了知尚且此等八緣亦互相於攝因為最初廣說之所緣緣者有增上非增上之二種此中增上者由所緣親依止相而攝親依止非增上者唯所緣緣業緣亦由俱生與異剎那有二種此中俱生業是對於自與俱生者唯由業緣而攝俱生異剎那業是由有力無力有二種此中有力業者是對諸異熟法以親依止為依緣其意味而攝親依止尚且復有力者對於諸色無力者對於諸非色而依異剎那業緣為緣食緣亦為色非色有二種此中非色食者對於自與俱生者以唯緣之意義而攝俱生緣色食者對於俱生前生後生而不為緣越自生起之剎那達於住者以言成食緣性之意味唯食緣根緣亦為色非色有二種此中非色根緣者是對於自與俱生者唯言成根緣之意味而攝俱生緣色根緣者由內外之別有二種此中內根緣是對於與前生後生之相應法與俱之眼識等言根緣之意味唯攝前生緣名為外根緣者是色命根此等者對俱生者雖然依維持為緣而非依能生因此根緣而已如是此等之八緣是互相相攝應了知此於最初八緣餘之十六及此等之八緣者是互相攝之理趣今於二十四緣之中各各攝於此等八緣一一之中者應了知此中於最初八種中之最初所緣緣唯所緣緣攝餘之二十三者是不攝於第二之俱生緣則因緣俱生增上緣俱生緣互相緣俱生依止緣俱生業緣異熟緣俱生食緣俱生根緣靜慮緣道緣相應緣俱生不相應緣俱生有緣俱生不去緣以上此等十五緣攝於第三之親依止緣則增上之所緣緣所緣之增上緣無間等無間親依止修習緣異剎那者之強力業緣無有不去緣以上此等九緣攝於第四之前生緣則前生緣前生依止緣前生根緣前生不相應緣前生有緣前生不去緣以上此等六緣攝於第五之後生緣則後生緣後生不相應緣後生有緣後生不去緣以上此等之四緣攝於第六之業緣則唯異剎那業緣攝於第七之食緣則唯依段食而食緣食有緣食不去緣以上此等之三緣攝於第八之根緣則色命根緣根有緣根不去緣以上此等之三緣攝如是於此等八緣之一一此等與此等之緣所攝應了知凡於其處所攝者依其數而言應了知如是攝一切緣由此等八緣於此逆是四十九問中之善法依善法之所緣緣為緣等摘出此等十五問而答此中善是依善善是依不善善是依無記善是依善無記等以上是善初之四問初者不善亦同復無記是依無記無記是依善無記是依不善等以上以無記初之三善與無記者是依善同依無記不善與無記是依不善同依無記等以上以二根為一終者四此等中於最初之問凡有諸緣全攝於三緣而說於第二是二於第三是五於第四唯一於第五是三於第六是二於第七是五於第八是一於第九是七於第十是三於第十一是三於第十二是二於第十三是四於第十四是二尚且於第十五亦同四此等不言依俱生緣而由俱生後生而言其處之理由於後當釋然略於此處一二三四五七以上緣之分量正有六項此於問分之逆為問上限之分量尚且又攝各各之諸緣而說示緣上限之分量因為於從非因緣等二十四緣逆中亦於一逆之中由此以上者問與緣皆不得然以下者得也是故凡於諸問善法是依善與無記法之俱生緣為緣者唯如是一緣所傳說者若其緣被否定時則此等之問者無有然於其問善法是依不善法之所緣緣為緣由親依止緣為緣者如是之二緣乃所傳說此中言從非所緣緣者如是之一緣雖被否定依餘緣則得其問然若否定此等之二緣同其分則無有如是凡三四五或得七者於此等之問除所否定之諸緣依餘得等之問然否定全部之諸緣時此等一切分亦斷也此正於此處之相依此相而由最初於一一之諸問略而說諸緣之種類與於各各之緣各各之問者之缺不缺應了知六七四然以下是廣說先於最初之問由三緣而示十九緣如何耶因為善是唯不依善之前生後生異熟不相應之緣為緣依餘之二十緣為緣所緣唯依此等中之一然於俱生依所攝一切而攝十五緣而說此等若因緣被否定時則為十四然善是不依善之異熟緣不相應緣之意味除此等之二餘指十二緣是依俱生緣為緣而說於親依止緣若攝一切者則攝九緣而言此等之中增上之所緣緣所緣之增上緣是與所緣增上而同唯入於親依止然善是依善而非異剎那業緣之意味除此是指餘之六由親依止緣為緣而言如是於最初之問依三緣而示十九緣應了知此等之中於此因逆則所謂善法是依善法之因緣為緣者是省察布施受戒作布薩業省察前之諸善行依如是等唯由於所緣緣等而言是同理趣應取出本文而示然若除所緣緣時則排除此廣說而入因緣廣說應示其本文餘緣於否定時亦同此理趣然其緣若被否定時則無矣諸分凡於後應釋然於第二問依二緣而示三緣如何耶因為善不依不善之無間等緣為緣是故排除此等依所緣親依止而攝並所緣增上指本性親依止而依親依止緣為緣而說是故單示所緣緣及所緣增上之增上緣親依止緣以上如是於第二問由二緣而示此等之三緣應了知然於第三問依五緣而說十八緣如何耶善是唯不依無記之互相前生修習異熟相應緣為緣是由餘之十九緣此等之中所緣緣是一又善是對於無記不由互相異熟相應緣為緣捨棄因緣業緣則另說明是故除此等之五為俱生十緣而說依親依止緣先說之六緣中除修習餘之五後生是唯一依俱生異剎那之二種業緣亦同以上如於第三問依五緣而示此等十八緣應了知於第四問依一緣而正有十如何耶善依善無記於俱生說十五之中不由互相異熟相應不相應緣為緣因緣是被否定除此等之五餘之十緣於此處由一緣而說應了知又如於此等善初之四於初不善之四問亦依各各之諸緣而示各各之諸緣者應了知六七六由此而後之無記等三問中之第一問則由七緣而說二十三緣如何耶無記雖依無記之二十四緣之任何之一為緣但若因緣被否定時則為二十三此等之中所緣緣是唯一又於此處為攝於非俱生食根緣是別而言故除此等之三由俱生而說十緣者依親依止緣則先說六前生緣是唯一後生食根緣亦同以上如是於此處依七緣而示說是等之二十三緣應了知於第二問亦依三緣而說示十二緣如何耶所緣緣者一復依所緣親依止而所緣增上無間等無間無有去親依止緣以上六緣而說示依前生緣則前生依止不相應有不去緣以上如是於依此處三緣而說示此等十二緣應了知於第三問亦同此理趣六七七由此而後二根之四問中於最初之問不依俱生緣依前生緣而言由言俱生前生之二依止有不去者為三緣而說示因為善蘊雖同皆所依善為性譬如雖為俱生而非俱生緣其理由是所依混入故是故由此等俱生之依止有不去故而言為俱生於所依亦同此理趣此亦雖如為前生然蘊混入故不為前生緣唯依前生依止等而言為前生於第二問由言俱生後生食根四者則示俱生依止有不去四緣因為於此分可得俱生緣而不得後生緣故然名為後生之食根者是對有不去而說其理由是諸善蘊與無記之大種是依諸所造色由俱生依止有不去為以上四種之緣然後生之諸善是同與俱此等之大種同對此等所造色而依有不去為緣也段食亦與俱後生之諸善對前生之身而唯依有不去為緣色命根亦與後生之諸善俱對諸業果色而唯依有不去緣為緣指以上此四類之緣此言為俱生後生食根緣也然而後生食根緣者於此處決不可得後者於不善混入二問亦同此理趣以上如是於此處各各之諸問則要略所說諸緣之種類應了知然於各各之緣各各諸問之缺與不缺者於後當說明六七九今是等善法是依善法等由順十五分已說於逆分亦唯是等此以上者雖為無有但以下有故於得各各之逆分是由初算數而示於非因十五等為始此中非因者是全依如已述之諸緣而得十五問於非所緣俱生之中入其因緣者於各各分單所緣緣乃無有依剩餘之緣而此等之分得答又如於非所緣於其餘亦如是於俱生中可入因緣又於各各之分非親依止非無間者如是為逆分而設置之諸緣者無有依餘緣各各之分者得答然於非俱生善法是依善與無記不善法是依不善與無記者善與無記法是依善不善與無記法是依不善以上此等之四分者無有因為是等四分中於初之二依俱生緣為緣依十一緣而一攝緣者而說此等俱生緣若被否定時依其他之相而不得答於最後之二是指依止有不去緣而言為俱生前生此等俱生若被否定時依其餘之因等與前生及依止有不去緣而不得答是故此等四分是無任何之一依餘而說十一緣者說此中因若被否定時依其餘之增上等如得此等之分如是俱生若被否定時依餘之因等何故不可得耶無分故也因為因等是俱生唯一分故於有分是故此等若被否定時依他緣而得此等之答分然俱生是無分而全因等所攝取是故此等若被否定時此等若全被否定其理由是非俱生之因緣等者決無有故如是俱生無分之故此等若被否定時此等兩分皆不可得復言於俱生前生之答分雖如為俱生緣但於此處俱生之非色蘊乃以依止有不去為緣又俱生若被否定時則俱生依止有不去乃一向被否定是故其否定故此等之分任何者皆不可得以上如是全於此處此等之四分者全無也唯由餘十一緣而言於非互相非依止非相應亦無此等之諸分何故耶順於俱生故因為如非色法之俱生緣即由無分而攝取四非色蘊互相依止相應亦如是順於俱生故若是等被否定時不得此等之答分應了知是故稱言非相應十一非依止十一非相應十一此中譬如此等無區別善等區別攝四蘊故雖順於俱生但善是依無記以除俱生即無別緣是故此等若被否定時則雖無其分然善是對善無記決無互相緣若被定時其分何故無有耶由互相緣法而轉生故恰如善無記者不依善之俱生緣以俱生法故依依止緣等而轉生如此等被否定時其分無有如是於此處亦以互相緣法故由俱生等而轉生若此等被否定時無其分言依非互相緣為緣之句義即如以下凡諸法雖言由互相緣而非為緣但善是依善無記之俱生等為緣依諸互相緣法為緣是故若此等被否定時則無其分如其餘之三亦然如是無四分言非依止十一者於此處亦為此等之分一向依止俱生緣法故若依止被否定時則無也非前生十三者言俱生前生除二之二根之答為十三因為此等俱生被否定時如前生之依止有不去緣而不得答是故除此等為十三緣應了知非後生十五者於此處依後生為緣或於俱生前生根食而傳說之處除後生由餘而可得此等之問故言為十五於非業等則業異熟食根靜慮道亦不外善等別四蘊之一分是故除此等之法由餘之法俱生之諸法為緣一問答亦非無有非相應十一者於此等四分相應之諸法由俱生等之緣法為緣是故若否定相應緣時此等之分為無應了知非不相應九者以二為根而一為終者四以一為根而二為終者二以上此等六分一向與不相應緣法而相應此等依俱生等為緣是故若不相應緣被否定時則此等亦全無唯得九是故言非不相應九於非有非不去亦不外於此等應了知其理由是此等乃一向與有去緣法相應故此等若否定此等而無也於可得者亦由所緣或由無間等而應作其答分由俱生前生後生食根之別五種之有不去緣或由不相應法而不作答六八如是於逆得分由如算數已示今由二根等算數示之以從非因緣與非所緣十五等始此中於非因根二根其多數者若與少數俱結合者為少數六八一於三根非親依止十三者是言善依不善不善依善之二分減何故耶是非所緣俱與非親依止緣組合故因為由所緣及由親依止而此等轉故然捨棄其兩也所緣增上是不外取所緣親依止六八二於六根亦言非親依止十三者亦不外其十三六八三然於七根云非親依止七者是與非俱生緣俱組合故於此處無與四俱善是依善善是依不善不善是依不善不善者依善者如是由此等之無間親依止本性親依止而轉者四以上之八乃無是故由餘之為七而言謂非前生十一者是與非俱生緣組合故為十一非後生九者於此等十一之中俱生後生食根所得二根答分之無記除此等之分其理由是此等俱生雖被否定時依後生之故雖非無與俱生俱後生被否定時言為無之意義由餘者言為九六八四於八根謂非依止十一者是全等於前述六八五於九根言非親依止五者是以善三法等始而終於無記者三及二根始而終於無記者二以上之五也於此等由如異剎那業段食色命根後生法而答應了知六八六於十根在非前生五等亦不外此等於此等言非後生三者是由後生得二根除無記終二分外是剩餘於非不相應者亦同其三非有二者是善與不善對於業果色然於此處之異熟是與非親依止俱結合故不可得也六八七於十一根之算數與先述者全同六八八於十二根非業一者是依無記而無記又此處之答是由食根而應了知於十三根等亦全有一於其處不外於此應了知然於非食由根而答應了知於非根之答是由食而應了知六八九於十四根等與非業俱組合故非有非不去者不言得從非食緣與非靜慮是除非根之外而說是故於此處由根而一應了知然此等二者為逆分而置於中無算數者是故非示一同非因根終畢六九五於非所緣根等亦十五十三十一九全於二根是四根本答數之區分然於三根等之多緣結合更於七五三二一及數之區分可得答於此等凡於諸緣之結合所得之各各由前所述之理趣應善思察而摘出又於全此等非所緣根等越非所緣等之句非因句與最初相結合而論說然此等全等於非因根而言是故不廣說而略說此中如於非因根非所緣非親依止緣是各別得十五分於結合唯得十三如是於一切處唯得十三又非所緣非俱生緣皆非親依止者有七分同於非親依止緣非所緣緣者皆於非俱生緣者七從非依止緣非親依止緣非後生三者是以善無記為終於此等業果色與食等起乃緣所生七二六於非食非根根之四根則非與非業俱結合故如於非因根一向得七三七於非根根置非親依止及非前生緣而謂作非食三者於非根緣以下此等之二緣組合為從非根緣乃至從非親依止緣與非食緣三從非根緣乃至從非前生緣與非食三以上如是是等二緣與非食緣共答數計算之義此中三者唯善等對於無記此中善不善對於諸業果色及前生身以後生緣為緣然無記之心心所是唯為後生緣以上三答為是等應了知然後與非後生俱組合故言為非食二此處對業果色而言善依無記不善亦同以上唯有是等得然食被否定故段食由有不去緣亦得緣性七四一於非不相應根之四根非親依止五者是善依俱生善善是依業果色名無記不善依俱生不善者同名依業果色無記者無記是依俱生無記以上如是之五從非不相應緣乃至非親依止三者是依前述同理趣而善等之三即依無記七四五從非有緣與非因九者是於從非因緣與非有已述九也因為全以一為根而一終者若由無間本性親依止而可得言非所緣九者亦唯於其等置非所緣於非親依止為二乃至依止於如是非有根之論法從非有緣與非因緣與非所緣緣如是次第前進而立非所緣緣此等三或者由此而後於非增上緣等隨一與俱乃至達依止緣止而前進於非親依止緣應作二答之義也七四七如是設類型而再由非所緣乃至非依止為止而取七緣言為非親依止二於此處為從非有緣與非因緣與非所緣緣非親依止二從非有緣與非因緣非所緣非增上緣與非親依止二如是從非所緣以後之非依止終一切句結合二者於此處然善依無記不善依無記依異剎那業為業界色之緣應了知於非親依止句與俱非前生緣等之一切處二然業緣於此中不取因為若取此之時則此等之分亦捨棄決不得答數如是各各與俱各各結合之時所得與無有者全部善考察之於一切緣之答數應引出順逆七五二於順逆因七所緣九者如是於順及非因十五非所緣十五如是得於逆之答數之諸緣凡置於逆緣者於逆得諸分之中凡為順置之緣於得順緣之諸分及相等分由此等而其答數應了知因為於順因緣因七者是得七分在逆之非所緣緣非所緣十五與得十五此等之中凡言因七者與此等於非所緣而言十五中善是依善無記善無記不善是依不善無記不善無記無記是依無記者以上是等之七相等也指此等而言從因緣與非所緣七於非增上七等此亦同理趣然於非俱生則非因緣故於非俱生則不得一是故不能與此等結合於非互相緣善等之三是對於色無記得指此言為三於非相應緣亦然然於非不相應緣善是依善不善是依不善無記是依無記等之非色法為三應了知非依止非有非不去者即如非俱生完全不可得與此等不相結合如是於此處七與三者唯有如是二分量依此等而少數與俱時則減少多數之答數而於緣所組合之答數應了知七五三此中若因俱生依止有不去者非所緣七善法是依善法之因緣為緣依俱生依止有不去緣為緣依非所緣緣為緣善因是依諸相應蘊之因緣為緣依俱生依止有不去緣為緣依非所緣緣為緣由以上此理趣應引出七分於非增上七等亦與此同理趣七五四於第二組互相攝入故除非相應緣於餘而言三然於非相應緣是指互相不相應之結生名色而言為一又互相緣於此處入於順組合中故由逆而不得是故不言為非互相緣又同於此處如是於其餘之組合已入順組合中緣於由逆不得而言七五五於第三組合入相應緣故全唯三七五六於第四組合入不相應緣故全依無記而無記者一從此以後異熟相應之時亦與此同理趣七六二若從因俱生依止根道有不去者於非所緣四者善依善善依無記善依善無記無記依無記者以上是等應了知於其他亦與此同理趣非互相二者善是依善無記無記是依無記以下亦於二同此理趣依此種方法於一切組合之答數者如所得應了知尚且又於此種順逆由俱生及雜分是等四百十五之組合而說彼等之中於各各之組合凡順設置緣者雖為一逆不得又於此處因根之最初組合順五緣而置故於逆出十九緣如是於順置之餘為逆而出又此處為順而置多緣者亦於逆者唯各各而出應了知又如於因根於所緣等之根此全整式同形應了知逆順一八於逆順如是因七所緣九者於順及非因十五非所緣十五者如是於逆得答數之諸緣凡置逆緣者逆得諸分中凡置順得順分及相等諸分依此等答數應了知因為在逆於非因緣可得非因十五與可得十五分在順所緣九者可得九分此中非因十五是言於此等之中九分等於所緣而言九由此等答數應了知此中於所緣而言九於非因言十五之中是等於善依善不善無記不善是依不善善無記無記是依無記善不善者以上此等之九指此等而言為從非因緣與所緣九於增上十等亦與此同理趣因為於所緣等之順算數所言之諸分即全得與非因緣在一起應了知善法是依善法之非因緣為緣由所緣緣為緣即布施受戒作布薩業而省察省察前之諸善行依方法此等之本文而引出言從非因緣與增上十者於此處除觀增上由餘之增上則於順分別而出之諸分應引出如是於此處有九十七三十三一等答數之區分由此等而與少數俱於多數算數亦豫減少於非因根等之論法之一根等一切結合於答數者應了知初此是一般類型可是此不通於一切之結合某緣與俱某緣結合時除一切相違之諸分依餘而於此處之答數應了知一九言從非因緣與非所緣緣與增上七者於此處善是依不善無記是依善無記是依不善依此等所緣增上而得三分相違何故耶言從非所緣緣故是故除此等唯依俱生增上之理趣而於此處善是依善無記善無記不善是依不善無記不善無記無記是依無記者以上七分應了知此等亦由言從非因緣者之語除觀增上而由餘之增上如是全依少數緣及依相違數而答數應了知凡諸緣為逆而置時順則不存在此等亦應了知譬如無間為逆而置時則順等無間修習無有去緣者不存在俱生為逆而置時則順因互相異熟靜慮道相應者不存在依止者為逆而置時則順所依前生者不存在食或根者為逆而置時則順因互相異熟靜慮道相應者不存在然所緣為逆而置時則順增上親依止緣者雖作存在但所緣增上所緣親依止則不得依此種方法應了知一切得與非得者依所得而諸分可摘出此中全於三根等亦同於無間七等與二根之得分一一三然於七根等從非俱生緣依止三者是依前生緣於所依依止者三於業二者唯異剎那業由食一者是依段食根一者是依六色根次第進是不相應三由善等而以無記為終之後生於有不去緣五者是此等三及善無記是依無記不善無記是依無記者由以上二者之後生根也然後生緣為逆以後言有不去一者無記是依無記之食根言非食之時則不可言從非根同言非根之時則不言為從非食緣因為二者若一同加以說明時則不可以算數故靜慮道緣等為逆而置時食或根之作一與順者而終於根一有一不去一食一有一不去一而言其餘亦於此處其意義已明非因根終一三非所緣根等之中於互相根謂從非互相緣與因三者善等依諸心等起色言增上八者於增上言十之中除善是依善不善是依不善等二其餘為八云俱生五者是於因述三與善與無記是依無記不善無記是依無記此等之二謂依止七者是俱此等之五無記是依善無記是依不善以上此等二之所依言業三者是不外與同於因所述於餘之三亦云與此同理趣增上三者是不外與前述者同一四八於非食根之中互相三者是除食緣依其餘之心所而應了知如前所述於此處亦唯非食非根中之一一而言但二者不可一同而言一五四從非相應緣與因三先於非互相所述者同增上八者是不外與前所述者同於非不相應根業五者是善等之思依俱生善等異剎那善不善之思依異熟者業等起色以上如是五也於食根緣之三則等於俱生緣於靜慮道緣之三者則等於因緣一六九於非有根不以因名為非有者決定唯有故此不言為所緣九又如因於其他與有緣之相相應者於此處為順而不存在謂業二者然是依異剎那業而言由逆則全得一七二復由順得者皆不豫取自此而後之諸分為逆而取彼得順後結合是故此處言從非有緣與非因緣乃至非不去業二然何故於自處不言耶餘全為逆而置者唯一為順而得故一七三從非有緣與非因緣與乃至非不去緣與親依止九者於此處亦同此理趣然此由本性親依止而言依此方法而全所得非所得者前所敘述者與後所述者應了知
